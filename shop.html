<!DOCTYPE html>
<html>

<head>

<title>Astris Shop</title>

<style>

body{
background:#000;
color:white;
font-family:Arial;
padding:40px;
}

h1{
font-size:60px;
}


.products{

display:grid;
grid-template-columns:repeat(3,1fr);
gap:30px;

}


.card{

background:#111;
border:1px solid #222;
border-radius:25px;
height:300px;
padding:25px;

display:flex;
flex-direction:column;
justify-content:end;

}


button{

padding:15px;
border-radius:30px;
border:none;
margin-top:15px;

}

</style>

</head>


<body>


<h1>ASTRIS SHOP</h1>


<div class="products">


<div class="card">

<h2>Foot Locks</h2>

<p>$40</p>

<button>Buy Now</button>

</div>


<div class="card">

<h2>Grips</h2>

<p>$25</p>

<button>Buy Now</button>

</div>


<div class="card">

<h2>Stickers</h2>

<p>$10</p>

<button>Buy Now</button>

</div>


</div>


</body>

</html>
