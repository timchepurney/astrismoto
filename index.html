<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Astris Moto</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#000;
color:white;
overflow-x:hidden;
}


header{
height:100px;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 60px;
border-bottom:1px solid #222;
}


.logo{
font-size:42px;
font-weight:900;
letter-spacing:5px;
}


.menu{
font-size:42px;
cursor:pointer;
}


.hero{
min-height:90vh;
display:flex;
flex-direction:column;
justify-content:center;
padding:60px;
}


.hero h1{
font-size:100px;
line-height:.9;
max-width:800px;
}


.hero p{
margin-top:25px;
font-size:25px;
color:#aaa;
max-width:600px;
}


button{
margin-top:40px;
padding:22px 55px;
border-radius:40px;
border:none;
font-size:20px;
cursor:pointer;
}


.shop{
background:white;
color:black;
}


.cards{
display:flex;
gap:25px;
padding:60px;
flex-wrap:wrap;
}


.card{
background:#111;
border:1px solid #222;
border-radius:25px;
padding:40px;
width:330px;
}


.card h2{
font-size:32px;
}


.card p{
color:#aaa;
margin-top:15px;
font-size:18px;
}



/* SIDE MENU */


#sideMenu{

position:fixed;
top:0;
right:-320px;
height:100%;
width:320px;
background:#0a0a0a;
padding:50px;
transition:.3s;
z-index:20;

}


#sideMenu h2{
font-size:35px;
}


#sideMenu a{

display:block;
color:white;
text-decoration:none;
font-size:25px;
margin-top:35px;

}


</style>

</head>


<body>


<header>

<div class="logo">ASTRIS</div>

<div class="menu" onclick="openMenu()">☰</div>

</header>



<div id="sideMenu">

<h2>ASTRIS</h2>

<a href="#">Accessories</a>

<a href="#">Clothing</a>

<a href="#">Parts</a>

<a href="#">Contact</a>

</div>



<section class="hero">

<h1>
Ride Different.
</h1>


<p>
Premium accessories and street style for electric riders.
</p>


<button class="shop">
Shop Now
</button>


</section>




<section class="cards">


<div class="card">

<h2>Accessories</h2>

<p>
Upgrade your ride with clean gear.
</p>

</div>



<div class="card">

<h2>Clothing</h2>

<p>
Simple fits for riders.
</p>

</div>



<div class="card">

<h2>Parts</h2>

<p>
Built for your setup.
</p>

</div>


</section>



<script>

function openMenu(){

let menu=document.getElementById("sideMenu");

if(menu.style.right==="0px"){

menu.style.right="-320px";

}

else{

menu.style.right="0px";

}

}

</script>



</body>
</html>
