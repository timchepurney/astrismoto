<!DOCTYPE html>
<html>
<head>

<title>Astris</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#000;
color:white;
font-family:Arial, Helvetica, sans-serif;
}


header{

height:120px;
display:flex;
align-items:center;
justify-content:space-between;

padding:0 6%;

background:#000;

position:sticky;
top:0;
z-index:10;

}


.logo{

font-size:55px;
font-weight:900;
letter-spacing:14px;

}


nav{

display:flex;
gap:25px;

}



nav button{

background:#111;

color:white;

border:1px solid #333;

padding:18px 30px;

border-radius:40px;

font-size:22px;

font-weight:800;

cursor:pointer;

}



.cart{

background:white;

color:black;

padding:18px 35px;

border:none;

border-radius:40px;

font-size:22px;

font-weight:900;

cursor:pointer;

}



.hero{

height:75vh;

display:flex;

flex-direction:column;

justify-content:center;

align-items:center;

text-align:center;

}



.hero h1{

font-size:140px;

letter-spacing:25px;

}



.hero p{

font-size:28px;

color:#777;

margin:30px;

}



.shop-btn{

padding:25px 90px;

border-radius:50px;

border:none;

font-size:25px;

font-weight:900;

}



.section{

padding:90px 7%;

display:none;

}



.active{

display:block;

}



h2{

font-size:65px;

margin-bottom:50px;

}



.back{

background:#111;

color:white;

padding:15px 30px;

border-radius:30px;

border:none;

font-size:20px;

margin-bottom:30px;

}



.cards{

display:grid;

grid-template-columns:repeat(3,1fr);

gap:35px;

}



.card{

height:360px;

background:#111;

border:1px solid #333;

border-radius:35px;

padding:35px;

display:flex;

flex-direction:column;

justify-content:end;

}



.card h3{

font-size:38px;

}



.card p{

font-size:25px;

color:#888;

margin:15px 0;

}



.add{

padding:15px 30px;

border-radius:30px;

border:none;

font-weight:900;

cursor:pointer;

}



#cart-box{

display:none;

position:fixed;

right:30px;

top:130px;

width:420px;

background:#111;

border:1px solid #333;

border-radius:35px;

padding:35px;

z-index:50;

}



.remove{

background:#222;

color:white;

border:none;

padding:8px 15px;

border-radius:20px;

margin-left:10px;

}


.cart-line{

display:flex;

justify-content:space-between;

margin:20px 0;

font-size:20px;

}



@media(max-width:800px){

header{

flex-wrap:wrap;

height:auto;

padding:25px;

}


.logo{

font-size:38px;

}


nav button{

font-size:14px;

padding:12px;

}


.cards{

grid-template-columns:1fr;

}


.hero h1{

font-size:70px;

}


#cart-box{

width:90%;

right:5%;

}

}


</style>

</head>


<body>


<header>


<div class="logo">ASTRIS</div>


<nav>

<button onclick="show('home')">Home</button>

<button onclick="show('accessories')">Accessories</button>

<button onclick="show('clothes')">Clothing</button>

</nav>


<button class="cart" onclick="openCart()">

🖤 Cart (<span id="count">0</span>)

</button>


</header>




<section id="home" class="section active">


<div class="hero">

<h1>ASTRIS</h1>

<p>Premium moto accessories & streetwear</p>

<button class="shop-btn" onclick="show('accessories')">

Shop Now

</button>

</div>


</section>





<section id="accessories" class="section">


<button class="back" onclick="show('home')">

← Back

</button>


<h2>Accessories</h2>


<div class="cards">


<div class="card">

<h3>Foot Locks</h3>

<p>$40</p>

<button class="add" onclick="add('Foot Locks',40)">
🖤 Add to Cart
</button>

</div>



<div class="card">

<h3>Grips</h3>

<p>$25</p>

<button class="add" onclick="add('Grips',25)">
🖤 Add to Cart
</button>

</div>


<div class="card">

<h3>Stickers</h3>

<p>$10</p>

<button class="add" onclick="add('Stickers',10)">
🖤 Add to Cart
</button>

</div>


</div>


</section>






<section id="clothes" class="section">


<button class="back" onclick="show('home')">

← Back

</button>


<h2>Clothing</h2>


<div class="cards">


<div class="card">

<h3>ASTRIS Tee</h3>

<p>$35</p>

<button class="add" onclick="add('ASTRIS Tee',35)">
🖤 Add to Cart
</button>

</div>



<div class="card">

<h3>ASTRIS Hoodie</h3>

<p>$70</p>

<button class="add" onclick="add('ASTRIS Hoodie',70)">
🖤 Add to Cart
</button>

</div>


</div>


</section>





<div id="cart-box">


<h2>Your Cart</h2>


<div id="items"></div>


<h3>Total: $<span id="total">0</span></h3>


<button class="back" onclick="closeCart">

Close

</button>


</div>






<script>


let cart = JSON.parse(localStorage.getItem("cart")) || [];



function save(){

localStorage.setItem("cart",JSON.stringify(cart));

}



function add(name,price){

cart.push({name,price});

save();

update();

}




function removeItem(i){

cart.splice(i,1);

save();

update();

}




function update(){


document.getElementById("count").innerHTML=cart.length;


let html="";

let total=0;


cart.forEach((item,i)=>{

total+=item.price;


html += `

<div class="cart-line">

${item.name}

<button class="remove" onclick="removeItem(${i})">
X
</button>

</div>

`;

});


document.getElementById("items").innerHTML=html;

document.getElementById("total").innerHTML=total;


}



function openCart(){

document.getElementById("cart-box").style.display="block";

update();

}



function closeCart(){

document.getElementById("cart-box").style.display="none";

}



function show(page){

document.querySelectorAll(".section").forEach(x=>{

x.classList.remove("active");

});


document.getElementById(page).classList.add("active");

}



update();


</script>


</body>
</html>
