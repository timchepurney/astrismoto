<!DOCTYPE html>
<html>
<head>

<title>ASTRIS MOTO</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{
width:100%;
overflow-x:hidden;
}

body{
background:#000;
color:white;
font-family:Arial,Helvetica,sans-serif;
}


#loader,#product-loader{
position:fixed;
inset:0;
background:#000;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
z-index:999;
}


#loader h1,#product-loader h1{
font-size:60px;
letter-spacing:12px;
}


.dots{
font-size:45px;
}


header{
width:100%;
min-height:120px;
display:flex;
align-items:center;
justify-content:space-between;
padding:20px 5%;
background:#000;
position:sticky;
top:0;
z-index:20;
}


.logo{
font-size:60px;
font-weight:900;
letter-spacing:12px;
white-space:nowrap;
}


nav{
display:flex;
gap:20px;
}


nav button,.cart{
background:#111;
color:white;
border:1px solid #333;
padding:20px 35px;
border-radius:50px;
font-size:20px;
font-weight:900;
}


.section{
padding:80px 5%;
}


.title{
font-size:65px;
margin-bottom:50px;
}


.cards{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:35px;
}


.card{
background:#111;
border-radius:35px;
padding:25px;
cursor:pointer;
}


.card img{
width:100%;
height:280px;
object-fit:cover;
border-radius:30px;
}


.card h2{
font-size:32px;
margin-top:20px;
}


.card p{
font-size:25px;
}


#product-page{
display:none;
text-align:center;
}



/* SLIDER */

.slider{
width:100%;
max-width:600px;
margin:auto;
overflow:hidden;
border-radius:35px;
}


.slides{
display:flex;
transition:.4s;
}


.slides img{
width:100%;
flex-shrink:0;
height:500px;
object-fit:cover;
}



.slide-buttons{
margin-top:25px;
}


.slide-buttons button{
padding:15px 30px;
border:none;
border-radius:40px;
font-size:20px;
font-weight:900;
margin:10px;
}



#product-page h1{
font-size:60px;
margin-top:30px;
}


#product-page h2{
font-size:40px;
}



.add,.checkout,.back{
padding:22px 45px;
border:none;
border-radius:50px;
font-size:25px;
font-weight:900;
margin:20px;
background:white;
color:black;
}


#cart-box{
display:none;
position:fixed;
right:20px;
top:140px;
width:420px;
max-width:90%;
background:#111;
border-radius:35px;
padding:30px;
z-index:100;
}


.cart-item{
display:flex;
justify-content:space-between;
margin:20px 0;
}



@media(max-width:800px){

header{
flex-wrap:wrap;
justify-content:center;
}


.logo{
width:100%;
text-align:center;
font-size:45px;
}


nav{
flex-wrap:wrap;
justify-content:center;
}


.cards{
grid-template-columns:1fr;
}


.slides img{
height:350px;
}

}

</style>

</head>

<body>
  <div id="loader">

<h1>ASTRIS MOTO</h1>

<div class="dots">...</div>

</div>



<div id="product-loader" style="display:none;">

<h1>ASTRIS MOTO</h1>

<div class="dots">...</div>

</div>



<header>

<div class="logo">ASTRIS</div>


<nav>

<button onclick="home()">Home</button>

<button onclick="filter('accessories')">Accessories</button>

<button onclick="filter('clothes')">Clothing</button>

</nav>


<button class="cart" onclick="openCart()">

🖤 Cart (<span id="count">0</span>)

</button>


</header>





<div id="products" class="section">


<h1 class="title">Most Popular</h1>


<div class="cards">



<div class="card accessories"
onclick="openProduct('Foot Locks',40,
['Images/footlocks1.jpg','Images/footlocks2.jpg','Images/footlocks3.jpg'])">


<img src="Images/footlocks1.jpg">

<h2>Foot Locks</h2>

<p>$40</p>

</div>



<div class="card clothes"
onclick="openProduct('ASTRIS Tee',35,
['Images/tee1.jpg','Images/tee2.jpg','Images/tee3.jpg'])">


<img src="Images/tee1.jpg">

<h2>ASTRIS Tee</h2>

<p>$35</p>

</div>


</div>




<h1 class="title">All Products</h1>


<div class="cards">



<div class="card accessories"
onclick="openProduct('Pegs',30,
['Images/pegs1.jpg','Images/pegs2.jpg','Images/pegs3.jpg'])">


<img src="Images/pegs1.jpg">

<h2>Pegs</h2>

<p>$30</p>

</div>




<div class="card accessories"
onclick="openProduct('Stickers',10,
['Images/stickers1.jpg','Images/stickers2.jpg','Images/stickers3.jpg'])">


<img src="Images/stickers1.jpg">

<h2>Stickers</h2>

<p>$10</p>

</div>





<div class="card clothes"
onclick="openProduct('Hoodie',70,
['Images/hoodie1.jpg','Images/hoodie2.jpg','Images/hoodie3.jpg'])">


<img src="Images/hoodie1.jpg">

<h2>Hoodie</h2>

<p>$70</p>

</div>



</div>

</div>





<div id="product-page" class="section">


<div class="slider">

<div class="slides" id="slides">

</div>

</div>


<div class="slide-buttons">

<button onclick="prevPic()">←</button>

<button onclick="nextPic()">→</button>

</div>



<h1 id="product-name"></h1>

<h2 id="product-price"></h2>



<button class="add" onclick="addCurrent()">

🖤 Add To Cart

</button>


<button class="checkout" onclick="checkout()">

Checkout

</button>



<button class="back" onclick="back()">

← BACK

</button>


</div>





<div id="cart-box">

<h1>Your Cart</h1>

<div id="items"></div>

<h2>Total $<span id="total">0</span></h2>


<button class="checkout" onclick="checkout()">

Checkout

</button>


<button class="back" onclick="closeCart()">

Close

</button>


</div>
<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

let current = {};

let pics = [];

let index = 0;



function save(){

localStorage.setItem("cart",JSON.stringify(cart));

}



function add(name,price){

cart.push({
name:name,
price:price
});

save();

update();

}



function addCurrent(){

add(current.name,current.price);

}



function update(){

document.getElementById("count").innerHTML = cart.length;


let html="";

let total=0;


cart.forEach((x,i)=>{

total += x.price;


html += `

<div class="cart-item">

${x.name} $${x.price}

<button onclick="removeItem(${i})">

X

</button>

</div>

`;

});


document.getElementById("items").innerHTML=html;

document.getElementById("total").innerHTML=total;

}




function removeItem(i){

cart.splice(i,1);

save();

update();

}




function openCart(){

document.getElementById("cart-box").style.display="block";

}



function closeCart(){

document.getElementById("cart-box").style.display="none";

}




function checkout(){

alert("Checkout coming soon 🖤");

}





function openProduct(name,price,images){


current={
name:name,
price:price
};


pics=images;

index=0;


document.getElementById("product-loader").style.display="flex";



setTimeout(()=>{


document.getElementById("product-loader").style.display="none";


document.getElementById("products").style.display="none";


document.getElementById("product-page").style.display="block";



loadPics();



document.getElementById("product-name").innerHTML=name;


document.getElementById("product-price").innerHTML="$"+price;



},1000);


}





function loadPics(){

let html="";


pics.forEach(pic=>{

html += `<img src="${pic}">`;

});


document.getElementById("slides").innerHTML=html;


document.getElementById("slides").style.transform=
`translateX(-${index*100}%)`;

}





function nextPic(){

if(index < pics.length-1){

index++;

document.getElementById("slides").style.transform=
`translateX(-${index*100}%)`;

}

}




function prevPic(){

if(index > 0){

index--;

document.getElementById("slides").style.transform=
`translateX(-${index*100}%)`;

}

}





let startX=0;


document.addEventListener("touchstart",e=>{

startX=e.touches[0].clientX;

});



document.addEventListener("touchend",e=>{


let endX=e.changedTouches[0].clientX;



if(startX-endX > 50){

nextPic();

}


if(endX-startX > 50){

prevPic();

}


});







function back(){

document.getElementById("product-page").style.display="none";

document.getElementById("products").style.display="block";

}




function home(){

document.querySelectorAll(".card").forEach(c=>{

c.style.display="block";

});

window.scrollTo(0,0);

}




function filter(type){

document.querySelectorAll(".card").forEach(c=>{


c.style.display =
c.classList.contains(type)
?"block"
:"none";


});


window.scrollTo(0,0);

}




window.onload=()=>{


setTimeout(()=>{

document.getElementById("loader").style.display="none";

},2000);



update();


}

</script>


</body>

</html>
