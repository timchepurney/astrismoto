<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ASTRIS MOTO</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}

body{
background:#000;
color:#fff;
overflow-x:hidden;
opacity:0;
transition:opacity .3s;
}

/* LOADER */
#loader{
position:fixed;
inset:0;
background:#000;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:9999;
}

/* HEADER */
header{
display:flex;
justify-content:space-between;
padding:15px;
border-bottom:1px solid #111;
position:sticky;
top:0;
background:#000;
}

.logo{letter-spacing:6px;font-weight:bold;}

.cart-btn{
background:#fff;
color:#000;
border:none;
padding:8px 12px;
border-radius:6px;
}

/* PRODUCTS */
.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
padding:20px;
gap:20px;
}

.card{
background:#111;
padding:12px;
border-radius:10px;
cursor:pointer;
}

.card img{width:100%;border-radius:8px;}

.card button{
width:100%;
margin-top:10px;
padding:10px;
border:none;
border-radius:6px;
background:#fff;
}

/* CART */
.cart{
position:fixed;
right:-400px;
top:0;
width:320px;
height:100%;
background:#111;
padding:20px;
transition:.3s;
overflow-y:auto;
}

.cart.open{right:0;}

.item{
display:flex;
justify-content:space-between;
padding:10px;
background:#000;
margin-bottom:10px;
}

/* PAGE */
.page{
position:fixed;
inset:0;
background:#000;
display:none;
flex-direction:column;
}

.page-top{
display:flex;
justify-content:space-between;
padding:15px;
}

.gallery{
display:flex;
overflow-x:auto;
height:300px;
}

.gallery img{
min-width:100%;
object-fit:cover;
}

.qty button{
padding:8px;
}

/* CHECKOUT */
.checkout{
position:fixed;
inset:0;
background:#000;
display:none;
flex-direction:column;
padding:20px;
}

.paypal{
background:#0070ba;
color:#fff;
padding:10px;
border:none;
margin-top:10px;
}

/* FADE */
.fade{
opacity:0;
transform:translateY(20px);
transition:.6s;
}
.fade.show{
opacity:1;
transform:translateY(0);
}
</style>
</head>

<body>

<div id="loader">
<h1>ASTRIS MOTO</h1>
<div>Loading...</div>
</div>

<header>
<div class="logo">ASTRIS</div>
<button class="cart-btn" onclick="toggleCart()">🛒 <span id="badge"></span></button>
</header>

<!-- PRODUCTS -->
<section class="products">

<div class="card fade" onclick="openProduct('Foot Locks',15)">
<img src="https://via.placeholder.com/800"/>
<h3>Foot Locks</h3>
<p>$15</p>
<button onclick="event.stopPropagation(); openProduct('Foot Locks',15)">View</button>
</div>

<div class="card fade" onclick="openProduct('Grips',10)">
<img src="https://via.placeholder.com/800"/>
<h3>Grips</h3>
<p>$10</p>
<button onclick="event.stopPropagation(); openProduct('Grips',10)">View</button>
</div>

<div class="card fade" onclick="openProduct('Aluminum Motor Cover',40)">
<img src="https://via.placeholder.com/800"/>
<h3>Aluminum Motor Cover</h3>
<p>$40</p>
<button onclick="event.stopPropagation(); openProduct('Aluminum Motor Cover',40)">View</button>
</div>

</section>

<!-- CART -->
<div class="cart" id="cart">
<h3>Cart</h3>
<div id="items"></div>
<h3 id="total"></h3>
<button class="paypal" onclick="openCheckout()">Checkout</button>
</div>

<!-- PRODUCT -->
<div class="page" id="page">
<div class="page-top">
<button onclick="closePage()">Back</button>
</div>

<div class="gallery" id="gallery"></div>

<div style="padding:20px">
<h2 id="pName"></h2>
<p id="pPrice"></p>

<div id="variant"></div>

<div>
<button onclick="qty(-1)">-</button>
<span id="qty">1</span>
<button onclick="qty(1)">+</button>
</div>

<button onclick="add()">Add to Cart</button>
</div>
</div>

<!-- CHECKOUT -->
<div class="checkout" id="checkout">
<h2>Checkout</h2>
<div id="checkoutItems"></div>
<h3 id="checkoutTotal"></h3>
<button class="paypal" onclick="pay()">PayPal</button>
<button onclick="closeCheckout()">Back</button>
</div>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || {};

let current = {name:"",price:0,qty:1,variant:null};

function save(){
localStorage.setItem("cart",JSON.stringify(cart));
}

/* PRODUCT */
function openProduct(name,price){

current = {name,price,qty:1,variant:null};

document.getElementById("pName").innerText=name;
document.getElementById("pPrice").innerText="$"+price;

let g=document.getElementById("gallery");
g.innerHTML="";
for(let i=0;i<3;i++){
g.innerHTML+=`<img src="https://via.placeholder.com/900"/>`;
}

/* VARIANT ONLY FOR MOTOR COVER */
let v=document.getElementById("variant");
v.innerHTML="";

if(name==="Aluminum Motor Cover"){
v.innerHTML=`
<button onclick="set('LBX')">Surron LBX</button>
<button onclick="set('XXX')">Talaria XXX</button>
`;
}

document.getElementById("page").style.display="flex";
}

/* VARIANT */
function set(type){
current.variant=type;
current.price=(type==="LBX")?40:45;
document.getElementById("pPrice").innerText="$"+current.price;
}

/* QTY */
function qty(x){
current.qty=Math.max(1,current.qty+x);
document.getElementById("qty").innerText=current.qty;
}

/* ADD */
function add(){

let name=current.name;
if(current.variant) name+=" ("+current.variant+")";

if(cart[name]){
cart[name].qty+=current.qty;
}else{
cart[name]={price:current.price,qty:current.qty};
}

save();
render();
closePage();
}

/* CART */
function render(){

let box=document.getElementById("items");
box.innerHTML="";

let total=0;
let count=0;

Object.keys(cart).forEach(n=>{
let i=cart[n];
total+=i.price*i.qty;
count+=i.qty;

box.innerHTML+=`
<div class="item">
${n} x${i.qty} — $${i.price*i.qty}
<button onclick="delete cart['${n}'];save();render()">X</button>
</div>`;
});

document.getElementById("total").innerText="Total: $"+total;
document.getElementById("badge").innerText=count;
}

/* CART TOGGLE */
function toggleCart(){
document.getElementById("cart").classList.toggle("open");
}

/* CHECKOUT */
function openCheckout(){

let box=document.getElementById("checkoutItems");
box.innerHTML="";

let total=0;

Object.keys(cart).forEach(n=>{
let i=cart[n];
total+=i.price*i.qty;

box.innerHTML+=`<div>${n} x${i.qty}</div>`;
});

document.getElementById("checkoutTotal").innerText="Total: $"+total;
document.getElementById("checkout").style.display="flex";
}

function closeCheckout(){
document.getElementById("checkout").style.display="none";
}

/* PAYPAL */
function pay(){
let total=0;
Object.keys(cart).forEach(n=>{
let i=cart[n];
total+=i.price*i.qty;
});
window.location.href="https://www.paypal.me/AstrisMoto/"+total;
}

/* CLOSE */
function closePage(){
document.getElementById("page").style.display="none";
}

/* LOAD */
window.onload=()=>{
setTimeout(()=>{
document.getElementById("loader").style.display="none";
document.body.style.opacity="1";
},1500);
render();
};

/* FADE */
const obs=new IntersectionObserver(e=>{
e.forEach(x=>{
if(x.isIntersecting)x.target.classList.add("show");
});
});
document.querySelectorAll(".fade").forEach(e=>obs.observe(e));

</script>

</body>
</html>
