<!DOCTYPE html>
<html>
<head>
<title>ASTRIS Moto</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
margin:0;
background:#000;
color:white;
}

header{
height:90px;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 5%;
border-bottom:1px solid #222;
position:relative;
}

.logo{
font-size:clamp(32px,5vw,55px);
font-weight:900;
letter-spacing:8px;
}

.menu{
font-size:40px;
cursor:pointer;
}

nav{
display:none;
position:absolute;
right:5%;
top:85px;
background:#111;
padding:25px;
border-radius:20px;
z-index:10;
}

nav a{
display:block;
color:white;
text-decoration:none;
font-size:20px;
margin:15px 0;
}

.hero{
height:80vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
padding:20px;
}

.hero h1{
font-size:clamp(65px,13vw,160px);
letter-spacing:15px;
margin:0;
}

.hero p{
font-size:clamp(18px,3vw,30px);
color:#aaa;
}

button{
padding:18px 50px;
border:none;
border-radius:40px;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

.section{
padding:60px 5%;
}

.section h2{
font-size:clamp(35px,6vw,60px);
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:25px;
}

.card{
background:#111;
border:1px solid #222;
border-radius:25px;
padding:30px;
height:230px;
display:flex;
flex-direction:column;
justify-content:end;
transition:.2s;
}

.card img{
width:100%;
height:130px;
object-fit:cover;
border-radius:18px;
margin-bottom:15px;
}

.card:hover{
transform:translateY(-5px);
}

.card h3{
font-size:28px;
margin:0;
}

.price{
color:#aaa;
font-size:20px;
}

@media(max-width:600px){

header{
height:80px;
}

.menu{
font-size:35px;
}

.hero{
height:70vh;
}

.card{
height:180px;
}

.section{
padding:40px 20px;
}

}

</style>

</head>

<body>

<header>

<div class="logo">ASTRIS</div>

<div class="menu" onclick="openMenu()">☰</div>

<nav id="nav">

<a href="#">Home</a>
<a href="#">Accessories</a>
<a href="#">Clothing</a>
<a href="#">Cart</a>

</nav>

</header>


<section class="hero">

<h1>ASTRIS</h1>

<p>Premium moto accessories & streetwear</p>

<button>Shop Now</button>

</section>



<section class="section">

<h2>Most Popular</h2>

<div class="products">


<div class="card">

<img src="IMG_6375.jpeg">

<h3>Foot Pegs</h3>

<p class="price">$49.99</p>

</div>


<div class="card">

<img src="grips.jpg">

<h3>Bike Grips</h3>

<p class="price">$19.99</p>

</div>


<div class="card">

<img src="stickers.jpg">

<h3>Stickers</h3>

<p class="price">$9.99</p>

</div>


</div>

</section>




<section class="section">

<h2>Products</h2>

<div class="products">


<div class="card">

<img src="pads.jpg">

<h3>Handlebar Pads</h3>

<p class="price">$24.99</p>

</div>


<div class="card">

<img src="tee.jpg">

<h3>ASTRIS Tee</h3>

<p class="price">$29.99</p>

</div>


<div class="card">

<img src="hoodie.jpg">

<h3>ASTRIS Hoodie</h3>

<p class="price">$59.99</p>

</div>


</div>

</section>



<script>

function openMenu(){

let menu=document.getElementById("nav");

if(menu.style.display=="block"){
menu.style.display="none";
}

else{
menu.style.display="block";
}

}

</script>


</body>
</html>
