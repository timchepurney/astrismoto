<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ASTRIS MOTO</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#000;
color:#fff;
overflow-x:hidden;
}

/* HEADER */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 40px;
position:sticky;
top:0;
background:#000;
border-bottom:1px solid #111;
}

.logo{
font-size:24px;
letter-spacing:4px;
font-weight:bold;
}

.cart-btn{
background:#fff;
color:#000;
padding:8px 14px;
border:none;
cursor:pointer;
font-weight:bold;
}

/* HERO */
.hero{
height:60vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
}

.hero h1{
font-size:60px;
letter-spacing:8px;
}

.hero p{
opacity:0.6;
margin-top:10px;
}

/* PRODUCTS */
.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
padding:40px;
}

.card{
background:#111;
padding:15px;
border-radius:10px;
transition:0.3s;
cursor:pointer;
}

.card:hover{
transform:scale(1.05);
}

.card img{
width:100%;
border-radius:10px;
}

.card h3{
margin-top:10px;
}

.card button{
margin-top:10px;
width:100%;
padding:10px;
border:none;
background:#fff;
color:#000;
cursor:pointer;
font-weight:bold;
}

/* CART */
.cart{
position:fixed;
right:-400px;
top:0;
width:300px;
height:100%;
background:#111;
padding:20px;
transition:0.3s;
overflow-y:auto;
border-left:1px solid #222;
}

.cart.open{
right:0;
}

.cart h2{
margin-bottom:20px;
}

.item{
margin-bottom:10px;
padding:10px;
background:#000;
border-radius:8px;
}

.close{
background:red;
color:#fff;
border:none;
padding:5px 10px;
cursor:pointer;
margin-bottom:10px;
}
</style>
</head>

<body>

<header>
<div class="logo">ASTRIS</div>
<button class="cart-btn" onclick="toggleCart()">CART 🛒</button>
</header>

<section class="hero">
<h1>ASTRIS MOTO</h1>
<p>built for riders. not followers.</p>
</section>

<section class="products" id="products">

<div class="card">
<img src="https://via.placeholder.com/300" />
<h3>Foot Locks</h3>
<p>$15</p>
<button onclick="addToCart('Foot Locks',15)">Add</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/300" />
<h3>Grips</h3>
<p>$10</p>
<button onclick="addToCart('Grips',10)">Add</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/300" />
<h3>Handlebar Pegs</h3>
<p>$18</p>
<button onclick="addToCart('Pegs',18)">Add</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/300" />
<h3>Stickers Pack</h3>
<p>$5</p>
<button onclick="addToCart('Stickers',5)">Add</button>
</div>

</section>

<div class="cart" id="cart">
<button class="close" onclick="toggleCart()">Close</button>
<h2>Your Cart</h2>
<div id="cartItems"></div>
<h3 id="total">Total: $0</h3>
</div>

<script>
let cart = [];

function toggleCart(){
document.getElementById("cart").classList.toggle("open");
}

function addToCart(name, price){
cart.push({name, price});
renderCart();
}

function renderCart(){
let container = document.getElementById("cartItems");
container.innerHTML = "";
let total = 0;

cart.forEach((item, i)=>{
total += item.price;

container.innerHTML += `
<div class="item">
${item.name} - $${item.price}
</div>
`;
});

document.getElementById("total").innerText = "Total: $" + total;
}
</script>

</body>
</html>
