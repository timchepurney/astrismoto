<!DOCTYPE html>
<html>
<head>
<title>Astris Moto</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, Helvetica, sans-serif;
}

body {
  background: #000;
  color: white;
}

header {
  height: 80px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 40px;
  border-bottom: 1px solid #222;
}

.logo {
  font-size: 28px;
  font-weight: 800;
  letter-spacing: 3px;
}

.menu {
  font-size: 28px;
  cursor: pointer;
}

.hero {
  height: calc(100vh - 80px);
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 40px;
}

.hero h1 {
  font-size: 70px;
  max-width: 700px;
  line-height: 1;
}

.hero p {
  margin-top: 20px;
  color: #aaa;
  font-size: 20px;
}

.buttons {
  margin-top: 35px;
}

button {
  padding: 15px 35px;
  border-radius: 30px;
  border: none;
  margin-right: 15px;
  cursor: pointer;
  font-size: 16px;
}

.shop {
  background: white;
  color: black;
}

.more {
  background: #222;
  color: white;
}

.cards {
  display: flex;
  gap: 20px;
  padding: 40px;
}

.card {
  background: #111;
  padding: 30px;
  border-radius: 20px;
  width: 250px;
}

.card h2 {
  margin-bottom: 10px;
}

.card p {
  color: #aaa;
}
</style>

</head>

<body>

<header>
<div class="logo">ASTRIS</div>

<div class="menu">☰</div>
</header>


<section class="hero">

<h1>Ride Different.</h1>

<p>
Premium accessories, style, and gear for electric riders.
</p>

<div class="buttons">
<button class="shop">Shop Now</button>
<button class="more">Explore</button>
</div>

</section>


<section class="cards">

<div class="card">
<h2>Accessories</h2>
<p>Upgrade your ride.</p>
</div>

<div class="card">
<h2>Clothing</h2>
<p>Clean street style.</p>
</div>

<div class="card">
<h2>Parts</h2>
<p>Built for riders.</p>
</div>

</section>


</body>
</html>
