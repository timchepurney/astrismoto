<!DOCTYPE html>
<html>
<head>
<title>Astris Moto</title>

<style>
* {
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body {
background:#000;
color:white;
}

header {
height:80px;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 40px;
border-bottom:1px solid #222;
}

.logo {
font-size:28px;
font-weight:800;
letter-spacing:3px;
}

.menu {
font-size:30px;
cursor:pointer;
}

.hero {
height:calc(100vh - 80px);
display:flex;
flex-direction:column;
justify-content:center;
padding:40px;
}

.hero h1 {
font-size:70px;
line-height:1;
}

.hero p {
margin-top:20px;
color:#aaa;
font-size:20px;
}

button {
margin-top:30px;
padding:15px 35px;
border-radius:30px;
border:none;
cursor:pointer;
}

.shop {
background:white;
color:black;
}

.cards {
display:flex;
gap:20px;
padding:40px;
flex-wrap:wrap;
}

.card {
background:#111;
padding:30px;
border-radius:20px;
width:250px;
}

.card p {
color:#aaa;
margin-top:10px;
}


/* MENU */

#sideMenu {
position:fixed;
top:0;
right:-280px;
height:100%;
width:280px;
background:#111;
padding:40px;
transition:.3s;
z-index:10;
}

#sideMenu a {
display:block;
color:white;
text-decoration:none;
margin:25px 0;
font-size:20px;
}

</style>

</head>


<body>


<header>

<div class="logo">ASTRIS</div>

<div class="menu" onclick="openMenu()">☰</div>

</header>



<div id="sideMenu">

<h2>ASTRIS</h2>

<a href="#">Accessories</a>
<a href="#">Clothing</a>
<a href="#">Parts</a>
<a href="#">Contact</a>

</div>



<section class="hero">

<h1>Ride Different.</h1>

<p>
Premium accessories and style for electric riders.
</p>

<button class="shop">
Shop Now
</button>

</section>



<section class="cards">


<div class="card">
<h2>Accessories</h2>
<p>Upgrade your ride.</p>
</div>


<div class="card">
<h2>Clothing</h2>
<p>Clean rider style.</p>
</div>


<div class="card">
<h2>Parts</h2>
<p>Built for performance.</p>
</div>


</section>



<script>

function openMenu(){

let menu = document.getElementById("sideMenu");

if(menu.style.right === "0px"){
menu.style.right="-280px";
}

else{
menu.style.right="0px";
}

}

</script>


</body>
</html>
