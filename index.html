<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ASTRIS MOTO</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}

body{
background:#000;
color:#fff;
overflow-x:hidden;
opacity:0;
transition:opacity .3s ease;
}

/* LOADER */
#loader{
position:fixed;
inset:0;
background:#000;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:99999;
}

/* HEADER */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
border-bottom:1px solid #111;
position:sticky;
top:0;
background:#000;
}

.logo{letter-spacing:6px;font-weight:bold;}

.cart-btn{
background:#fff;
color:#000;
border:none;
padding:8px 12px;
border-radius:8px;
position:relative;
}

.badge{
position:absolute;
top:-6px;
right:-6px;
background:red;
color:#fff;
font-size:11px;
padding:2px 6px;
border-radius:50%;
display:none;
}

/* PRODUCTS */
.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
padding:20px;
}

.card{
background:#111;
padding:12px;
border-radius:10px;
cursor:pointer;
}

.card img{width:100%;border-radius:8px;}

.card button{
width:100%;
margin-top:10px;
padding:10px;
border:none;
border-radius:6px;
background:#fff;
}

/* CART / PAGE / CHECKOUT */
.panel{
position:fixed;
inset:0;
background:#000;
display:none;
flex-direction:column;
overflow-y:auto;
padding:20px;
}

.top-bar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:15px;
}

.big-exit{
background:#fff;
color:#000;
border:none;
padding:10px 15px;
border-radius:8px;
cursor:pointer;
}

/* CART ITEMS */
.item{
display:flex;
justify-content:space-between;
background:#111;
padding:10px;
border-radius:8px;
margin-bottom:10px;
}

/* GALLERY */
.gallery{
display:flex;
overflow-x:auto;
height:280px;
gap:10px;
}

.gallery img{
min-width:100%;
border-radius:8px;
object-fit:cover;
}

/* CHECKOUT ITEM */
.checkout-item{
display:flex;
gap:10px;
align-items:center;
background:#111;
padding:10px;
border-radius:10px;
margin-bottom:10px;
}

.checkout-item img{
width:70px;
height:70px;
border-radius:8px;
object-fit:cover;
}

/* PAYPAL */
.paypal{
background:#0070ba;
color:#fff;
padding:12px;
border:none;
border-radius:8px;
margin-top:10px;
}

/* FOOTER */
footer{
text-align:center;
padding:40px;
color:#888;
border-top:1px solid #111;
}

footer a{
color:#fff;
text-decoration:none;
}
</style>
</head>

<body>

<!-- LOADER -->
<div id="loader">
<h1>ASTRIS MOTO</h1>
<div>Loading...</div>
</div>

<header>
<div class="logo">ASTRIS</div>
<button class="cart-btn" onclick="openCart()">🛒 <span id="badge"></span></button>
</header>

<!-- PRODUCTS -->
<section class="products">

<div class="card" onclick="openProduct('Foot Locks',15)">
<img src="https://via.placeholder.com/800"/>
<h3>Foot Locks</h3>
<p>$15</p>
</div>

<div class="card" onclick="openProduct('Grips',10)">
<img src="https://via.placeholder.com/800"/>
<h3>Grips</h3>
<p>$10</p>
</div>

<div class="card" onclick="openProduct('Aluminum Motor Cover',40)">
<img src="https://via.placeholder.com/800"/>
<h3>Aluminum Motor Cover</h3>
<p>$40</p>
</div>

</section>

<!-- CART -->
<div class="panel" id="cart">
<div class="top-bar">
<h2>Cart</h2>
<button class="big-exit" onclick="closeCart()">Exit ✕</button>
</div>

<div id="items"></div>
<h3 id="total"></h3>

<button class="paypal" onclick="openCheckout()">Checkout</button>
</div>

<!-- PRODUCT -->
<div class="panel" id="product">
<div class="top-bar">
<h2>Product</h2>
<button class="big-exit" onclick="closeProduct()">Exit ✕</button>
</div>

<div class="gallery" id="gallery"></div>

<h2 id="pName"></h2>
<p id="pPrice"></p>

<div id="variant"></div>

<div>
<button onclick="qty(-1)">-</button>
<span id="qty">1</span>
<button onclick="qty(1)">+</button>
</div>

<button onclick="add()">Add to Cart</button>
</div>

<!-- CHECKOUT -->
<div class="panel" id="checkout">

<div class="top-bar">
<h2>Checkout</h2>
<button class="big-exit" onclick="closeCheckout()">Exit ✕</button>
</div>

<div id="checkoutItems"></div>
<h3 id="checkoutTotal"></h3>

<button class="paypal" onclick="pay()">PayPal 💳</button>
</div>

<!-- FOOTER -->
<footer>
<p>© 2026 ASTRIS MOTO</p>
<p>
Contact:
<a href="https://mail.google.com/mail/?view=cm&fs=1&to=Astrismoto@gmail.com" target="_blank">
Astrismoto@gmail.com
</a>
</p>
</footer>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || {};
let current = {name:"",price:0,qty:1,variant:null};

function save(){
localStorage.setItem("cart",JSON.stringify(cart));
}

/* PRODUCT */
function openProduct(name,price){

current={name,price,qty:1,variant:null};

document.getElementById("pName").innerText=name;
document.getElementById("pPrice").innerText="$"+price;

let g=document.getElementById("gallery");
g.innerHTML="";
for(let i=0;i<3;i++){
g.innerHTML+=`<img src="https://via.placeholder.com/900"/>`;
}

let v=document.getElementById("variant");
v.innerHTML="";

/* ONLY MOTOR COVER */
if(name==="Aluminum Motor Cover"){
v.innerHTML=`
<button onclick="set('LBX')">Surron LBX</button>
<button onclick="set('XXX')">Talaria XXX</button>
`;
}

document.getElementById("product").style.display="flex";
}

/* VARIANT */
function set(t){
current.variant=t;
current.price=(t==="LBX")?40:45;
document.getElementById("pPrice").innerText="$"+current.price;
}

/* QTY */
function qty(x){
current.qty=Math.max(1,current.qty+x);
document.getElementById("qty").innerText=current.qty;
}

/* ADD */
function add(){

let name=current.name;
if(current.variant) name+=" ("+current.variant+")";

if(cart[name]){
cart[name].qty+=current.qty;
}else{
cart[name]={price:current.price,qty:current.qty};
}

save();
render();
closeProduct();
}

/* CART */
function render(){

let box=document.getElementById("items");
box.innerHTML="";

let total=0;
let count=0;

Object.keys(cart).forEach(n=>{
let i=cart[n];
total+=i.price*i.qty;
count+=i.qty;

box.innerHTML+=`
<div class="item">
${n} x${i.qty} — $${i.price*i.qty}
<button onclick="delete cart['${n}'];save();render()">X</button>
</div>`;
});

document.getElementById("total").innerText="Total: $"+total;
document.getElementById("badge").innerText=count;
}

/* CART OPEN */
function openCart(){
document.getElementById("cart").style.display="flex";
render();
}
function closeCart(){
document.getElementById("cart").style.display="none";
}

/* PRODUCT CLOSE */
function closeProduct(){
document.getElementById("product").style.display="none";
}

/* CHECKOUT */
function openCheckout(){

let box=document.getElementById("checkoutItems");
box.innerHTML="";

let total=0;

Object.keys(cart).forEach(n=>{
let i=cart[n];
total+=i.price*i.qty;

box.innerHTML+=`
<div class="checkout-item">
<img src="https://via.placeholder.com/80"/>
<div>
<div><b>${n}</b></div>
<div>Qty: ${i.qty}</div>
<div>$${i.price*i.qty}</div>
</div>
</div>`;
});

document.getElementById("checkoutTotal").innerText="Total: $"+total;
document.getElementById("checkout").style.display="flex";
}

function closeCheckout(){
document.getElementById("checkout").style.display="none";
}

/* PAYPAL */
function pay(){
let total=0;
Object.keys(cart).forEach(n=>{
let i=cart[n];
total+=i.price*i.qty;
});
window.location.href="https://www.paypal.me/AstrisMoto/"+total;
}

/* LOAD SAFE */
window.onload=()=>{
setTimeout(()=>{
document.getElementById("loader").style.display="none";
document.body.style.opacity="1";
render();
},1200);
};

</script>

</body>
</html>
