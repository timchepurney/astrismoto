<!DOCTYPE html>
<html>
<head>

<title>Astris</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#000;
color:white;
font-family:Arial, Helvetica, sans-serif;
}


header{

height:120px;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 6%;

background:#000;

position:sticky;
top:0;
z-index:10;

}


.logo{

font-size:55px;
font-weight:900;
letter-spacing:14px;

}


nav{

display:flex;
gap:20px;

}


nav button,.cart{

background:#111;
color:white;

border:1px solid #333;

padding:16px 25px;

border-radius:40px;

font-weight:900;

cursor:pointer;

}



.section{

padding:70px 7%;

}



.cards{

display:grid;

grid-template-columns:repeat(3,1fr);

gap:30px;

}



.card{

background:#111;

border:1px solid #333;

border-radius:30px;

padding:25px;

cursor:pointer;

}



.card img{

width:100%;

height:230px;

object-fit:cover;

border-radius:20px;

}



.card h3{

font-size:35px;

margin-top:15px;

}



.card p{

color:#aaa;

font-size:22px;

}



.add,.buy,.back{

padding:15px 25px;

border:none;

border-radius:30px;

font-weight:900;

margin-top:15px;

cursor:pointer;

}


.add{

background:white;

}



.buy{

background:#333;

color:white;

}



#product-page{

display:none;

}



.product img{

width:450px;

max-width:100%;

border-radius:30px;

}



.product h1{

font-size:60px;

}



#cart-box{

display:none;

position:fixed;

right:30px;

top:130px;

width:420px;

background:#111;

border-radius:30px;

padding:30px;

z-index:50;

}



.cart-line{

display:flex;

justify-content:space-between;

margin:20px 0;

}



.remove{

background:#222;

color:white;

border:none;

padding:8px;

border-radius:20px;

}



@media(max-width:800px){

.cards{

grid-template-columns:1fr;

}


.logo{

font-size:35px;

}

}

</style>

</head>



<body>



<header>

<div class="logo">ASTRIS</div>


<nav>

<button onclick="showProducts('all')">Home</button>

<button onclick="showProducts('accessories')">Accessories</button>

<button onclick="showProducts('clothes')">Clothing</button>

</nav>


<button class="cart" onclick="openCart()">

🖤 Cart (<span id="count">0</span>)

</button>


</header>






<div id="products" class="section">


<h1>Most Popular</h1>


<div class="cards">



<div class="card accessories" onclick="openProduct('Foot Locks',40,'Images/footlocks.jpg')">


<img src="Images/footlocks.jpg">


<h3>Foot Locks</h3>

<p>$40</p>


</div>





<div class="card clothes" onclick="openProduct('ASTRIS Hoodie',70,'Images/hoodie.jpg')">


<img src="Images/hoodie.jpg">


<h3>ASTRIS Hoodie</h3>

<p>$70</p>


</div>





<div class="card clothes" onclick="openProduct('ASTRIS Tee',35,'Images/tee.jpg')">


<img src="Images/tee.jpg">


<h3>ASTRIS Tee</h3>

<p>$35</p>


</div>





<div class="card accessories" onclick="openProduct('Grips',25,'Images/grips.jpg')">


<img src="Images/grips.jpg">


<h3>Grips</h3>

<p>$25</p>


</div>



</div>

</div>






<div id="product-page" class="section">


<button class="back" onclick="back()">

← Back

</button>


<div class="product">


<img id="product-img">


<h1 id="product-name"></h1>

<h2 id="product-price"></h2>


<button class="add" onclick="addCurrent()">

🖤 Add to Cart

</button>


<button class="buy">

Buy Now

</button>


</div>

</div>






<div id="cart-box">


<h2>Your Cart</h2>


<div id="items">

</div>


<h3>Total: $<span id="total">0</span></h3>


<button class="back" onclick="closeCart()">

Close

</button>


</div>







<script>


let cart = JSON.parse(localStorage.getItem("cart")) || [];


let current={};



function save(){

localStorage.setItem("cart",JSON.stringify(cart));

}



function addCurrent(){

add(current.name,current.price);

}



function add(name,price){

cart.push({
name:name,
price:price
});


save();

update();

}




function update(){

document.getElementById("count").innerHTML=cart.length;


let html="";

let total=0;


cart.forEach((item,index)=>{


total+=item.price;


html+=`

<div class="cart-line">

${item.name} $${item.price}

<button class="remove" onclick="removeItem(${index})">

X

</button>

</div>

`;

});


document.getElementById("items").innerHTML=html;


document.getElementById("total").innerHTML=total;


}




function removeItem(index){

cart.splice(index,1);

save();

update();

}




function openCart(){

document.getElementById("cart-box").style.display="block";

}



function closeCart(){

document.getElementById("cart-box").style.display="none";

}



function openProduct(name,price,img){


current={
name:name,
price:price
};


document.getElementById("products").style.display="none";

document.getElementById("product-page").style.display="block";


document.getElementById("product-img").src=img;

document.getElementById("product-name").innerHTML=name;

document.getElementById("product-price").innerHTML="$"+price;


}



function back(){

document.getElementById("product-page").style.display="none";

document.getElementById("products").style.display="block";

}




function showProducts(type){


document.getElementById("product-page").style.display="none";

document.getElementById("products").style.display="block";


let cards=document.querySelectorAll(".card");


cards.forEach(card=>{


if(type==="all"){

card.style.display="block";

}

else if(card.classList.contains(type)){

card.style.display="block";

}

else{

card.style.display="none";

}


});


}



update();


</script>



</body>
</html>
