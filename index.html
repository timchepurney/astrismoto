<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASTRIS MOTO</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- LOADER -->
<div id="loader">
  <h1>ASTRIS MOTO</h1>
  <p>Loading...</p>
</div>

<!-- BACKDROP (for menu + cart feel cleaner) -->
<div id="backdrop"></div>

<!-- ☰ SIDE MENU -->
<div id="sideMenu">
  <button class="exit-btn" id="closeMenu">✕</button>

  <h2>ASTRIS</h2>

  <a href="#home">Home</a>
  <a href="#products">Shop All</a>

  <div style="margin-top:10px;color:#777;">Accessories</div>

  <a href="#products">Surron LBX Covers</a>
  <a href="#products">Talaria X3 Covers</a>
</div>

<!-- HEADER -->
<header>

<button class="menu-btn">☰</button>

<h1 class="logo">ASTRIS</h1>

<div class="header-icons">

<button class="icon-btn">🔍</button>

<button class="icon-btn" id="cartButton">
🛒 <span id="cartCount">0</span>
</button>

</div>

</header>

<!-- HOME -->
<main id="home">

<section class="hero">

<h2>Ride Beyond Limits.</h2>
<p>Premium Aluminum Covers for Surron & Talaria.</p>

<button id="shopNow">Shop All</button>

</section>

<section class="products" id="products"></section>

</main>

<!-- PRODUCT PAGE -->
<section id="productPage" class="page">

<div class="page-header">

<button class="back-btn">← Back</button>
<button class="exit-btn" id="closeProduct">✕</button>

</div>

<div id="productGallery"></div>

<div class="product-info">

<p class="brand">ASTRIS MOTO</p>

<h1 id="productTitle"></h1>

<div class="reviews">
★★★★★ <span>0 Reviews</span>
</div>

<h2 id="productPrice"></h2>

<div id="variantButtons"></div>

<div class="quantity">
  <button class="qty-minus">−</button>
  <span>1</span>
  <button class="qty-plus">+</button>
</div>

<button class="cart-large">Add to Cart</button>
<button class="buy-large">Buy Now</button>

</div>

<section class="related">
<h2>You May Also Like</h2>
<div id="relatedProducts"></div>
</section>

</section>

<!-- CART -->
<div id="cartDrawer">

<div class="drawer-header">

<h2>Cart</h2>
<button class="closeCart">✕</button>

</div>

<div id="cartItems"></div>

<div class="cart-footer">

<h3 id="cartTotal">$0.00</h3>

<button id="checkoutBtn">Checkout</button>

</div>

</div>

<script src="products.js"></script>
<script src="script.js"></script>

</body>
</html>
