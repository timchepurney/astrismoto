<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ASTRIS MOTO</title>

<style>
:root{
--bg:#000;
--card:#111;
--card2:#151515;
--text:#fff;
--muted:#9a9a9a;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}

body{
background:var(--bg);
color:var(--text);
overflow-x:hidden;
}

/* LOADER FULL FIX */
#loader{
position:fixed;
inset:0;
background:#000;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:99999;
}

#loader h1{
letter-spacing:10px;
font-size:22px;
}

.dots::after{
content:"";
animation:dots 1s infinite steps(3);
}
@keyframes dots{
0%{content:"."}
33%{content:".."}
66%{content:"..."}
}

/* HEADER */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 20px;
border-bottom:1px solid #111;
position:sticky;
top:0;
background:#000;
z-index:1000;
}

.logo{letter-spacing:6px;font-weight:bold;}

.cart-btn{
position:relative;
background:#fff;
color:#000;
padding:8px 12px;
border:none;
border-radius:6px;
cursor:pointer;
}

.badge{
position:absolute;
top:-6px;
right:-6px;
background:red;
color:#fff;
font-size:11px;
padding:2px 6px;
border-radius:50%;
display:none;
}

/* HERO */
.hero{
height:45vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.hero h1{
font-size:50px;
letter-spacing:8px;
}

.hero p{
color:var(--muted);
margin-top:10px;
}

/* PRODUCTS */
.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
padding:25px;
}

.card{
background:var(--card);
padding:12px;
border-radius:12px;
cursor:pointer;
transition:.25s;
}

.card:hover{transform:scale(1.03);background:var(--card2);}

.card img{
width:100%;
border-radius:10px;
}

.card h3{margin-top:10px;}

.card p{color:var(--muted);}

.card button{
margin-top:10px;
width:100%;
padding:10px;
border:none;
border-radius:8px;
background:#fff;
color:#000;
font-weight:bold;
cursor:pointer;
}

/* CART */
.cart{
position:fixed;
right:-420px;
top:0;
width:320px;
height:100%;
background:#111;
padding:20px;
transition:.3s;
z-index:2000;
overflow-y:auto;
}

.cart.open{right:0;}

.item{
display:flex;
justify-content:space-between;
align-items:center;
background:#000;
padding:10px;
border-radius:8px;
margin-bottom:10px;
}

.item button{
background:red;
border:none;
color:#fff;
padding:4px 7px;
border-radius:4px;
cursor:pointer;
}

/* PAYPAL */
.paypal{
margin-top:15px;
width:100%;
padding:10px;
border:none;
border-radius:8px;
background:#0070ba;
color:#fff;
font-weight:bold;
cursor:pointer;
}

/* PRODUCT PAGE */
.page{
position:fixed;
inset:0;
background:#000;
display:none;
flex-direction:column;
z-index:3000;
}

.page-top{
display:flex;
justify-content:space-between;
padding:15px;
border-bottom:1px solid #111;
}

.gallery{
display:flex;
overflow-x:auto;
scroll-snap-type:x mandatory;
height:300px;
}

.gallery img{
min-width:100%;
height:300px;
object-fit:cover;
scroll-snap-align:center;
}

.details{
padding:20px;
}

.qty{
display:flex;
align-items:center;
gap:10px;
margin-top:10px;
}

.qty button{
padding:8px 12px;
border:none;
background:#fff;
color:#000;
border-radius:6px;
cursor:pointer;
}

/* LOADER DOT FIX */
</style>
</head>

<body>

<!-- LOADER -->
<div id="loader">
<h1>ASTRIS MOTO</h1>
<div class="dots">Loading</div>
</div>

<header>
<div class="logo">ASTRIS</div>
<button class="cart-btn" onclick="toggleCart()">
🛒
<span id="badge" class="badge">0</span>
</button>
</header>

<section class="hero">
<h1>ASTRIS MOTO</h1>
<p>built for riders. not followers.</p>
</section>

<section class="products">

<div class="card" onclick="openProduct('Foot Locks',15)">
<img src="https://via.placeholder.com/500"/>
<h3>Foot Locks</h3>
<p>$15</p>
<button onclick="event.stopPropagation(); add('Foot Locks',15)">Add</button>
</div>

<div class="card" onclick="openProduct('Grips',10)">
<img src="https://via.placeholder.com/500"/>
<h3>Grips</h3>
<p>$10</p>
<button onclick="event.stopPropagation(); add('Grips',10)">Add</button>
</div>

<div class="card" onclick="openProduct('Pegs',18)">
<img src="https://via.placeholder.com/500"/>
<h3>Pegs</h3>
<p>$18</p>
<button onclick="event.stopPropagation(); add('Pegs',18)">Add</button>
</div>

</section>

<!-- CART -->
<div class="cart" id="cart">
<h3>Your Cart</h3>
<div id="items"></div>

<h3 id="total">Total: $0</h3>

<button class="paypal" onclick="checkout()">
Pay with PayPal 💳
</button>
</div>

<!-- PRODUCT PAGE -->
<div class="page" id="page">

<div class="page-top">
<button onclick="closePage()">Back</button>
<button onclick="toggleCart()">Cart</button>
</div>

<div class="gallery" id="gallery"></div>

<div class="details">
<h2 id="pName"></h2>
<p id="pPrice"></p>

<div class="qty">
<button onclick="changeQty(-1)">-</button>
<span id="qty">1</span>
<button onclick="changeQty(1)">+</button>
</div>

<button style="margin-top:15px;width:100%;padding:12px;background:#fff;color:#000;border:none;border-radius:8px;"
onclick="addFromPage()">Add to Cart</button>
</div>

</div>

<script>

let cart=[];
let current={name:"",price:0,qty:1};

function toggleCart(){
document.getElementById("cart").classList.toggle("open");
}

function add(name,price){
cart.push({name,price});
render();
}

function render(){
let box=document.getElementById("items");
box.innerHTML="";

let total=0;

cart.forEach((x,i)=>{
total+=x.price;

box.innerHTML+=`
<div class="item">
${x.name} $${x.price}
<button onclick="removeItem(${i})">X</button>
</div>`;
});

document.getElementById("total").innerText="Total: $"+total;

/* badge fix */
document.getElementById("badge").innerText=cart.length;
document.getElementById("badge").style.display=cart.length?"block":"none";
}

function removeItem(i){
cart.splice(i,1);
render();
}

/* PRODUCT PAGE */
function openProduct(name,price){
current={name,price,qty:1};

document.getElementById("pName").innerText=name;
document.getElementById("pPrice").innerText="$"+price;

let g=document.getElementById("gallery");
g.innerHTML="";

for(let i=0;i<3;i++){
g.innerHTML+=`<img src="https://via.placeholder.com/800"/>`;
}

document.getElementById("qty").innerText=1;
document.getElementById("page").style.display="flex";
}

function closePage(){
document.getElementById("page").style.display="none";
}

function changeQty(v){
current.qty=Math.max(1,current.qty+v);
document.getElementById("qty").innerText=current.qty;
}

function addFromPage(){
for(let i=0;i<current.qty;i++){
cart.push({name:current.name,price:current.price});
}
render();
closePage();
}

/* PAYPAL */
function checkout(){
window.location.href="https://www.paypal.me/AstrisMoto";
}

/* LOADER */
window.onload=()=>{
setTimeout(()=>{
document.getElementById("loader").style.display="none";
},2000);

render();
};

</script>

</body>
</html>
