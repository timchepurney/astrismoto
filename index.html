<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Astris</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, Helvetica, sans-serif;
}

body{
  background:#fff;
  color:#111;
}

header{
  height:80px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 35px;
  border-bottom:1px solid #eee;
}

.logo{
  font-size:26px;
  font-weight:800;
  letter-spacing:2px;
}

.menu{
  font-size:30px;
  cursor:pointer;
}

.hero{
  height:85vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  padding:40px;
  background:
  linear-gradient(rgba(0,0,0,.35),rgba(0,0,0,.35)),
  url("https://images.unsplash.com/photo-1558981806-ec527fa84c39");
  background-size:cover;
  background-position:center;
  color:white;
}

.hero h1{
  font-size:55px;
  max-width:600px;
}

.hero p{
  margin:20px 0;
  font-size:18px;
}

.button{
  width:max-content;
  background:white;
  color:black;
  padding:15px 30px;
  border-radius:30px;
  text-decoration:none;
  font-weight:bold;
}

.products{
  padding:50px 30px;
}

.products h2{
  font-size:35px;
  margin-bottom:30px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
}

.card{
  background:#f5f5f5;
  border-radius:20px;
  padding:30px;
  height:220px;
  display:flex;
  flex-direction:column;
  justify-content:flex-end;
  transition:.2s;
}

.card:hover{
  transform:translateY(-5px);
}

.card h3{
  font-size:22px;
}

.card p{
  color:#666;
}

footer{
  padding:30px;
  text-align:center;
  background:#111;
  color:white;
}

</style>
</head>


<body>

<header>

<div class="logo">
ASTRIS
</div>

<div class="menu">
☰
</div>

</header>


<section class="hero">

<h1>
Ride Different.
Built For The Streets.
</h1>

<p>
Premium eMoto accessories, gear, and lifestyle.
</p>

<a class="button" href="#shop">
Shop Now
</a>

</section>


<section class="products" id="shop">

<h2>Shop</h2>

<div class="grid">

<div class="card">
<h3>Accessories</h3>
<p>Upgrade your ride</p>
</div>

<div class="card">
<h3>Apparel</h3>
<p>Clean street style</p>
</div>

<div class="card">
<h3>Parts</h3>
<p>Ride essentials</p>
</div>

</div>

</section>


<footer>
© 2026 ASTRIS
</footer>


</body>
</html>
