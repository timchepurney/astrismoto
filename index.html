<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ASTRIS MOTO</title>

<style>
:root{
--bg:#000;
--card:#111;
--card2:#171717;
--text:#fff;
--muted:#9a9a9a;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}

body{
background:var(--bg);
color:var(--text);
overflow-x:hidden;
}

/* LOADER (TRUE FULL FIX) */
#loader{
position:fixed;
top:0;left:0;
width:100vw;
height:100vh;
background:#000;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:999999;
}

#loader h1{
letter-spacing:10px;
font-size:22px;
}

.dots::after{
content:"";
animation:dots 1s infinite steps(3);
}
@keyframes dots{
0%{content:"."}
33%{content:".."}
66%{content:"..."}
}

/* HEADER */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 20px;
position:sticky;
top:0;
background:#000;
border-bottom:1px solid #111;
z-index:1000;
}

.logo{
letter-spacing:6px;
font-weight:bold;
}

.cart-btn{
position:relative;
background:#fff;
color:#000;
border:none;
padding:8px 12px;
border-radius:6px;
cursor:pointer;
}

.badge{
position:absolute;
top:-6px;
right:-6px;
background:red;
color:#fff;
font-size:11px;
padding:2px 6px;
border-radius:50%;
display:none;
}

/* HERO */
.hero{
height:45vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.hero h1{font-size:52px;letter-spacing:8px;}
.hero p{color:var(--muted);margin-top:10px;}

/* PRODUCTS */
.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
padding:25px;
}

.card{
background:var(--card);
padding:12px;
border-radius:12px;
cursor:pointer;
transition:.25s;
}

.card:hover{
transform:scale(1.03);
background:var(--card2);
}

.card img{
width:100%;
border-radius:10px;
}

.card h3{margin-top:10px;}
.card p{color:var(--muted);}

.card button{
margin-top:10px;
width:100%;
padding:10px;
border:none;
border-radius:8px;
background:#fff;
color:#000;
font-weight:bold;
cursor:pointer;
}

/* CART */
.cart{
position:fixed;
top:0;
right:-420px;
width:320px;
height:100%;
background:#111;
padding:20px;
transition:.3s;
z-index:2000;
overflow-y:auto;
}

.cart.open{right:0;}

.cart-top{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:15px;
}

.cart-top button{
background:#000;
color:#fff;
border:1px solid #222;
padding:6px 10px;
border-radius:6px;
cursor:pointer;
}

.item{
display:flex;
justify-content:space-between;
align-items:center;
background:#000;
padding:10px;
border-radius:8px;
margin-bottom:10px;
}

.item button{
background:red;
border:none;
color:#fff;
padding:4px 7px;
border-radius:4px;
cursor:pointer;
}

/* PAYPAL */
.paypal{
margin-top:15px;
width:100%;
padding:10px;
border:none;
border-radius:8px;
background:#0070ba;
color:#fff;
font-weight:bold;
cursor:pointer;
}

/* FOOTER */
footer{
padding:40px;
text-align:center;
border-top:1px solid #111;
color:var(--muted);
}

footer a{
color:#fff;
}

/* FADE SCROLL (SMOOTH BOTH WAYS) */
.fade{
opacity:0;
transform:translateY(25px);
transition:all .7s ease;
}

.fade.show{
opacity:1;
transform:translateY(0);
}
</style>
</head>

<body>

<!-- LOADER -->
<div id="loader">
<h1>ASTRIS MOTO</h1>
<div class="dots">Loading</div>
</div>

<header>
<div class="logo">ASTRIS</div>

<button class="cart-btn" onclick="toggleCart()">
🛒
<span id="badge" class="badge">0</span>
</button>
</header>

<section class="hero fade">
<h1>ASTRIS MOTO</h1>
<p>built for riders. not followers.</p>
</section>

<section class="products">

<div class="card fade" onclick="add('Foot Locks',15)">
<img src="https://via.placeholder.com/700"/>
<h3>Foot Locks</h3>
<p>$15</p>
<button onclick="event.stopPropagation(); add('Foot Locks',15)">Add</button>
</div>

<div class="card fade" onclick="add('Grips',10)">
<img src="https://via.placeholder.com/700"/>
<h3>Grips</h3>
<p>$10</p>
<button onclick="event.stopPropagation(); add('Grips',10)">Add</button>
</div>

<div class="card fade" onclick="add('Pegs',18)">
<img src="https://via.placeholder.com/700"/>
<h3>Pegs</h3>
<p>$18</p>
<button onclick="event.stopPropagation(); add('Pegs',18)">Add</button>
</div>

</section>

<!-- CART -->
<div class="cart" id="cart">

<div class="cart-top">
<h3>Cart</h3>
<button onclick="toggleCart()">✕</button>
</div>

<div id="items"></div>

<h3 id="total">Total: $0</h3>

<button class="paypal" onclick="checkout()">
Pay with PayPal 💳
</button>

</div>

<!-- FOOTER RESTORED -->
<footer class="fade">
<p>© 2026 ASTRIS MOTO</p>
<p>Contact: <a href="mailto:Astrismoto@gmail.com">Astrismoto@gmail.com</a></p>
</footer>

<script>

let cart=[];

/* CART TOGGLE */
function toggleCart(){
document.getElementById("cart").classList.toggle("open");
}

/* ADD ITEM (FIXED LOGIC) */
function add(name,price){
cart.push({name,price});
render();
}

/* RENDER CART (NO BUGS) */
function render(){

let box=document.getElementById("items");
box.innerHTML="";

let total=0;

cart.forEach((x,i)=>{
total+=x.price;

box.innerHTML+=`
<div class="item">
${x.name} $${x.price}
<button onclick="cart.splice(${i},1);render()">X</button>
</div>`;
});

/* badge FIX */
let b=document.getElementById("badge");
b.innerText=cart.length;
b.style.display=cart.length?"block":"none";

document.getElementById("total").innerText="Total: $"+total;
}

/* PAYPAL */
function checkout(){
window.location.href="https://www.paypal.me/AstrisMoto";
}

/* LOADER FIX */
window.onload=()=>{
setTimeout(()=>{
document.getElementById("loader").style.display="none";
},2000);

render();
};

/* FADE SCROLL BOTH WAYS */
const obs=new IntersectionObserver(entries=>{
entries.forEach(e=>{
if(e.isIntersecting){
e.target.classList.add("show");
}else{
e.target.classList.remove("show");
}
});
});

document.querySelectorAll(".fade").forEach(e=>obs.observe(e));

</script>

</body>
</html>
