<!DOCTYPE html>

<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Business AI Helper</title>

<style>

body {

  margin: 0;

  font-family: Arial, sans-serif;

  background: #0a0a0a;

  color: white;

  text-align: center;

}

header {

  padding: 50px 20px;

}

h1 {

  font-size: 45px;

}

p {

  color: #bdbdbd;

}

.card {

  background: #171717;

  margin: 20px auto;

  padding: 25px;

  border-radius: 20px;

  max-width: 500px;

}

button {

  background: white;

  color: black;

  border: none;

  padding: 14px 25px;

  border-radius: 30px;

  font-size: 16px;

  cursor: pointer;

}

input {

  width: 80%;

  padding: 15px;

  border-radius: 20px;

  border: none;

  margin-top: 15px;

}

</style>

</head>

<body>

<header>

<h1>Business AI Helper</h1>

<p>Your AI partner for ideas, marketing, and growth.</p>

</header>

<div class="card">

<h2>Need help?</h2>

<p>Ask questions about business, dropshipping, marketing, or ideas.</p>

<input placeholder="Type your question...">

<br><br>

<button>Ask AI</button>

</div>

<div class="card">

<h2>What we help with</h2>

<p>💡 Business ideas</p>

<p>📈 Marketing tips</p>

<p>🚀 Growth strategies</p>

<p>🛒 Online stores</p>

</div>

</body>

</html
