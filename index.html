<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ASTRIS MOTO</title>

<style>
:root{
--bg:#000;
--card:#111;
--muted:#9a9a9a;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}

body{
background:var(--bg);
color:#fff;
overflow-x:hidden;
}

/* LOADER */
#loader{
position:fixed;
inset:0;
width:100vw;
height:100vh;
background:#000;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:999999;
}

#loader h1{
letter-spacing:10px;
font-size:22px;
}

.dots::after{
content:"";
animation:dots 1s infinite steps(3);
}
@keyframes dots{
0%{content:"."}
33%{content:".."}
66%{content:"..."}
}

/* HEADER */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 20px;
border-bottom:1px solid #111;
position:sticky;
top:0;
background:#000;
z-index:1000;
}

.logo{letter-spacing:6px;font-weight:bold;}

.cart-btn{
position:relative;
background:#fff;
color:#000;
border:none;
padding:8px 12px;
border-radius:6px;
cursor:pointer;
}

.badge{
position:absolute;
top:-6px;
right:-6px;
background:red;
color:#fff;
font-size:11px;
padding:2px 6px;
border-radius:50%;
display:none;
}

/* PRODUCTS */
.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
padding:25px;
}

.card{
background:var(--card);
padding:12px;
border-radius:12px;
cursor:pointer;
transition:.25s;
}

.card:hover{transform:scale(1.03);}

.card img{
width:100%;
border-radius:10px;
}

.card h3{margin-top:10px;}
.card p{color:var(--muted);}

.card button{
margin-top:10px;
width:100%;
padding:10px;
border:none;
border-radius:8px;
background:#fff;
color:#000;
font-weight:bold;
cursor:pointer;
}

/* CART */
.cart{
position:fixed;
top:0;
right:-420px;
width:320px;
height:100%;
background:#111;
padding:20px;
transition:.3s;
z-index:2000;
overflow-y:auto;
}

.cart.open{right:0;}

.cart-top{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:15px;
}

.cart-top button{
background:#000;
color:#fff;
border:1px solid #222;
padding:6px 10px;
border-radius:6px;
cursor:pointer;
}

.item{
display:flex;
justify-content:space-between;
align-items:center;
background:#000;
padding:10px;
border-radius:8px;
margin-bottom:10px;
}

/* PAYPAL */
.paypal{
margin-top:15px;
width:100%;
padding:10px;
border:none;
border-radius:8px;
background:#0070ba;
color:#fff;
font-weight:bold;
cursor:pointer;
}

/* PRODUCT PAGE */
.page{
position:fixed;
inset:0;
background:#000;
display:none;
flex-direction:column;
z-index:3000;
}

.page-top{
display:flex;
justify-content:space-between;
padding:15px;
border-bottom:1px solid #111;
}

.gallery{
display:flex;
overflow-x:auto;
scroll-snap-type:x mandatory;
height:300px;
}

.gallery img{
min-width:100%;
height:300px;
object-fit:cover;
scroll-snap-align:center;
}

.details{
padding:20px;
}

.qty{
display:flex;
gap:10px;
align-items:center;
margin-top:10px;
}

.qty button{
padding:8px 12px;
border:none;
background:#fff;
color:#000;
border-radius:6px;
cursor:pointer;
}

/* FADE */
.fade{
opacity:0;
transform:translateY(25px);
transition:.7s ease;
}
.fade.show{
opacity:1;
transform:translateY(0);
}

/* FOOTER */
footer{
padding:40px;
text-align:center;
border-top:1px solid #111;
color:var(--muted);
}
footer a{color:#fff;}
</style>
</head>

<body>

<!-- LOADER -->
<div id="loader">
<h1>ASTRIS MOTO</h1>
<div class="dots">Loading</div>
</div>

<header>
<div class="logo">ASTRIS</div>
<button class="cart-btn" onclick="toggleCart()">🛒 <span id="badge" class="badge">0</span></button>
</header>

<!-- PRODUCTS -->
<section class="products">

<div class="card fade" onclick="openProduct('Foot Locks',15)">
<img src="https://via.placeholder.com/800"/>
<h3>Foot Locks</h3>
<p>$15</p>
<button onclick="event.stopPropagation(); openProduct('Foot Locks',15)">View</button>
</div>

<div class="card fade" onclick="openProduct('Grips',10)">
<img src="https://via.placeholder.com/800"/>
<h3>Grips</h3>
<p>$10</p>
<button onclick="event.stopPropagation(); openProduct('Grips',10)">View</button>
</div>

<div class="card fade" onclick="openProduct('Aluminum Motor Cover',40)">
<img src="https://via.placeholder.com/800"/>
<h3>Aluminum Motor Cover</h3>
<p>$40</p>
<button onclick="event.stopPropagation(); openProduct('Aluminum Motor Cover',40)">View</button>
</div>

</section>

<!-- CART -->
<div class="cart" id="cart">

<div class="cart-top">
<h3>Cart</h3>
<button onclick="toggleCart()">✕</button>
</div>

<div id="items"></div>

<h3 id="total">Total: $0</h3>

<button class="paypal" onclick="checkout()">PayPal 💳</button>

</div>

<!-- PRODUCT PAGE -->
<div class="page" id="page">

<div class="page-top">
<button onclick="closePage()">Back</button>
</div>

<div class="gallery" id="gallery"></div>

<div class="details">

<h2 id="pName"></h2>
<p id="pPrice"></p>

<div style="margin:10px 0;">
<button onclick="setFit('LBX')">Surron LBX</button>
<button onclick="setFit('XXX')">Talaria XXX</button>
</div>

<div class="qty">
<button onclick="qty(-1)">-</button>
<span id="qty">1</span>
<button onclick="qty(1)">+</button>
</div>

<button style="margin-top:15px;width:100%;padding:12px;background:#fff;color:#000;border:none;border-radius:8px;"
onclick="confirmAdd()">Add to Cart</button>

</div>
</div>

<!-- FOOTER -->
<footer class="fade">
<p>© 2026 ASTRIS MOTO</p>
<p>Contact: <a href="mailto:Astrismoto@gmail.com">Astrismoto@gmail.com</a></p>
</footer>

<script>

let cart = {};
let current = {name:"",price:0,qty:1,fit:"LBX"};

/* CART */
function toggleCart(){
document.getElementById("cart").classList.toggle("open");
}

function addToCart(name,price){
if(cart[name]) cart[name].qty++;
else cart[name]={price,qty:1};
render();
}

function render(){

let box=document.getElementById("items");
box.innerHTML="";

let total=0;
let count=0;

Object.keys(cart).forEach(name=>{
let i=cart[name];
total+=i.price*i.qty;
count+=i.qty;

box.innerHTML+=`
<div class="item">
${name} x${i.qty} — $${i.price*i.qty}
<button onclick="delete cart['${name}']; render()">X</button>
</div>`;
});

document.getElementById("total").innerText="Total: $"+total;

let b=document.getElementById("badge");
b.innerText=count;
b.style.display=count?"block":"none";
}

/* PRODUCT */
function openProduct(name,price){

current={name,price,qty:1,fit:"LBX"};

document.getElementById("pName").innerText=name;
document.getElementById("pPrice").innerText="$"+price;

let g=document.getElementById("gallery");
g.innerHTML="";

for(let i=0;i<3;i++){
g.innerHTML+=`<img src="https://via.placeholder.com/900"/>`;
}

document.getElementById("qty").innerText=1;
document.getElementById("page").style.display="flex";
}

function closePage(){
document.getElementById("page").style.display="none";
}

function qty(v){
current.qty=Math.max(1,current.qty+v);
document.getElementById("qty").innerText=current.qty;
}

function setFit(f){
current.fit=f;
}

function confirmAdd(){
let final = current.name + " ("+current.fit+")";
for(let i=0;i<current.qty;i++){
addToCart(final,current.price);
}
closePage();
}

/* PAYPAL */
function checkout(){
window.location.href="https://www.paypal.me/AstrisMoto";
}

/* LOADER */
window.onload=()=>{
setTimeout(()=>{
document.getElementById("loader").style.display="none";
},2000);
render();
};

/* FADE */
const obs=new IntersectionObserver(e=>{
e.forEach(x=>{
if(x.isIntersecting)x.target.classList.add("show");
});
},{threshold:0.15});

document.querySelectorAll(".fade").forEach(e=>obs.observe(e));

</script>

</body>
</html>
