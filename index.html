<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ASTRIS MOTO</title>

<style>
:root{
--bg:#000;
--card:#111;
--muted:#9a9a9a;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:var(--bg);
color:#fff;
overflow-x:hidden;
}

/* LOADER */
#loader{
position:fixed;
inset:0;
width:100vw;
height:100vh;
background:#000;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:999999;
}

#loader h1{
letter-spacing:10px;
font-size:22px;
}

.dots::after{
content:"";
animation:dots 1s infinite steps(3);
}
@keyframes dots{
0%{content:"."}
33%{content:".."}
66%{content:"..."}
}

/* HEADER */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 20px;
border-bottom:1px solid #111;
position:sticky;
top:0;
background:#000;
z-index:1000;
}

.logo{letter-spacing:6px;font-weight:bold;}

.cart-btn{
position:relative;
background:#fff;
color:#000;
border:none;
padding:8px 12px;
border-radius:6px;
cursor:pointer;
}

.badge{
position:absolute;
top:-6px;
right:-6px;
background:red;
color:#fff;
font-size:11px;
padding:2px 6px;
border-radius:50%;
display:none;
}

/* PRODUCTS */
.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
padding:25px;
}

.card{
background:var(--card);
padding:12px;
border-radius:12px;
cursor:pointer;
transition:.25s;
}

.card:hover{
transform:scale(1.03);
}

.card img{
width:100%;
border-radius:10px;
}

.card h3{margin-top:10px;}
.card p{color:var(--muted);}

.card button{
margin-top:10px;
width:100%;
padding:10px;
border:none;
border-radius:8px;
background:#fff;
color:#000;
font-weight:bold;
cursor:pointer;
}

/* CART */
.cart{
position:fixed;
top:0;
right:-420px;
width:320px;
height:100%;
background:#111;
padding:20px;
transition:.3s;
z-index:2000;
overflow-y:auto;
}

.cart.open{right:0;}

.cart-top{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:15px;
}

.cart-top button{
background:#000;
color:#fff;
border:1px solid #222;
padding:6px 10px;
border-radius:6px;
cursor:pointer;
}

.item{
display:flex;
justify-content:space-between;
align-items:center;
background:#000;
padding:10px;
border-radius:8px;
margin-bottom:10px;
}

/* PAYPAL */
.paypal{
margin-top:15px;
width:100%;
padding:10px;
border:none;
border-radius:8px;
background:#0070ba;
color:#fff;
font-weight:bold;
cursor:pointer;
}

/* FOOTER */
footer{
padding:40px;
text-align:center;
border-top:1px solid #111;
color:var(--muted);
}

footer a{color:#fff;}

/* FADE */
.fade{
opacity:0;
transform:translateY(25px);
transition:.7s ease;
}
.fade.show{
opacity:1;
transform:translateY(0);
}
</style>
</head>

<body>

<!-- LOADER -->
<div id="loader">
<h1>ASTRIS MOTO</h1>
<div class="dots">Loading</div>
</div>

<header>
<div class="logo">ASTRIS</div>

<button class="cart-btn" onclick="toggleCart()">
🛒 <span id="badge" class="badge">0</span>
</button>
</header>

<!-- PRODUCTS -->
<section class="products">

<div class="card fade" onclick="add('Foot Locks',15)">
<img src="https://via.placeholder.com/800"/>
<h3>Foot Locks</h3>
<p>$15</p>
<button onclick="event.stopPropagation(); add('Foot Locks',15)">Add</button>
</div>

<div class="card fade" onclick="add('Grips',10)">
<img src="https://via.placeholder.com/800"/>
<h3>Grips</h3>
<p>$10</p>
<button onclick="event.stopPropagation(); add('Grips',10)">Add</button>
</div>

<div class="card fade" onclick="add('Aluminum Motor Cover',40)">
<img src="https://via.placeholder.com/800"/>
<h3>Aluminum Motor Cover</h3>
<p>$40</p>
<button onclick="event.stopPropagation(); add('Aluminum Motor Cover',40)">Add</button>
</div>

<div class="card fade" onclick="add('Surron LBX Fitment',0)">
<img src="https://via.placeholder.com/800"/>
<h3>Surron LBX Fitment</h3>
<p>select option</p>
<button onclick="event.stopPropagation(); add('Surron LBX Fitment',0)">Select</button>
</div>

<div class="card fade" onclick="add('Talaria XXX Fitment',0)">
<img src="https://via.placeholder.com/800"/>
<h3>Talaria XXX Fitment</h3>
<p>select option</p>
<button onclick="event.stopPropagation(); add('Talaria XXX Fitment',0)">Select</button>
</div>

</section>

<!-- CART -->
<div class="cart" id="cart">

<div class="cart-top">
<h3>Cart</h3>
<button onclick="toggleCart()">✕</button>
</div>

<div id="items"></div>

<h3 id="total">Total: $0</h3>

<button class="paypal" onclick="checkout()">
PayPal Checkout 💳
</button>

</div>

<!-- FOOTER -->
<footer class="fade">
<p>© 2026 ASTRIS MOTO</p>
<p>Contact: <a href="mailto:Astrismoto@gmail.com">Astrismoto@gmail.com</a></p>
</footer>

<script>

let cart = {};

/* CART SYSTEM (GROUPED) */
function add(name, price){

if(cart[name]){
cart[name].qty++;
} else {
cart[name] = {price:price, qty:1};
}

render();
}

function render(){

let box = document.getElementById("items");
box.innerHTML = "";

let total = 0;
let count = 0;

Object.keys(cart).forEach(name=>{
let item = cart[name];
total += item.price * item.qty;
count += item.qty;

box.innerHTML += `
<div class="item">
<div>${name} x${item.qty} — $${item.price * item.qty}</div>
<button onclick="delete cart['${name}']; render()">X</button>
</div>`;
});

document.getElementById("total").innerText = "Total: $" + total;

let b = document.getElementById("badge");
b.innerText = count;
b.style.display = count ? "block" : "none";
}

/* CART */
function toggleCart(){
document.getElementById("cart").classList.toggle("open");
}

/* PAYPAL */
function checkout(){
window.location.href="https://www.paypal.me/AstrisMoto";
}

/* LOADER */
window.onload=()=>{
setTimeout(()=>{
document.getElementById("loader").style.display="none";
},2000);
render();
};

/* FADE */
const obs=new IntersectionObserver(entries=>{
entries.forEach(e=>{
if(e.isIntersecting){
e.target.classList.add("show");
}
});
},{threshold:0.15});

document.querySelectorAll(".fade").forEach(el=>obs.observe(el));

</script>

</body>
</html>
