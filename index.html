<!DOCTYPE html>
<html>
<head>

<title>ASTRIS MOTO</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#000;
color:white;
font-family:Arial,Helvetica,sans-serif;
}


#loader{

position:fixed;
inset:0;
background:#000;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:999;

}

#loader h1{

letter-spacing:10px;
font-size:45px;

}

.dots{

font-size:40px;
margin-top:20px;

}



header{

height:120px;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 6%;
position:sticky;
top:0;
background:#000;
z-index:20;

}


.logo{

font-size:55px;
font-weight:900;
letter-spacing:12px;

}


nav{

display:flex;
gap:20px;

}


button{

cursor:pointer;

}



nav button,.cart{

background:#111;
color:white;
border:1px solid #333;
padding:18px 30px;
border-radius:40px;
font-size:20px;
font-weight:900;

}



.section{

padding:90px 7%;

}


.title{

font-size:70px;
margin-bottom:50px;

}



.cards{

display:grid;
grid-template-columns:repeat(3,1fr);
gap:35px;

}



.card{

background:#111;
border-radius:35px;
padding:25px;
opacity:0;
transform:translateY(40px);
transition:.6s;

}


.card.show{

opacity:1;
transform:translateY(0);

}



.card img{

width:100%;
height:230px;
object-fit:cover;
border-radius:25px;

}



.card h2{

margin-top:20px;

}



.add,.buy,.back,.checkout{

padding:18px 35px;
border:none;
border-radius:40px;
font-weight:900;
margin-top:15px;

}



.add{

background:white;
color:black;

}



.checkout{

background:white;
color:black;
width:100%;

}



#cart-box{

display:none;
position:fixed;
right:25px;
top:130px;
width:400px;
background:#111;
border:1px solid #333;
border-radius:30px;
padding:30px;
z-index:100;

}



.cart-item{

display:flex;
justify-content:space-between;
margin:15px 0;

}



.remove{

background:#222;
color:white;
border:none;
padding:8px;
border-radius:20px;

}


@media(max-width:800px){

.cards{

grid-template-columns:1fr;

}


.logo{

font-size:35px;

}

}


</style>

</head>


<body>



<div id="loader">

<h1>ASTRIS MOTO</h1>

<div class="dots">...</div>

</div>





<header>

<div class="logo">ASTRIS</div>


<nav>

<button onclick="home()">Home</button>

<button onclick="filter('accessories')">Accessories</button>

<button onclick="filter('clothes')">Clothing</button>

</nav>


<button class="cart" onclick="openCart()">

🖤 Cart (<span id="count">0</span>)

</button>


</header>






<section class="section" id="products">


<h1 class="title">Most Popular</h1>


<div class="cards">



<div class="card accessories">

<img src="Images/footlocks.jpg">

<h2>Foot Locks</h2>

<p>$40</p>

<button class="add" onclick="add('Foot Locks',40)">
Add to Cart
</button>

</div>



<div class="card clothes">

<img src="Images/tee.jpg">

<h2>ASTRIS Tee</h2>

<p>$35</p>

<button class="add" onclick="add('ASTRIS Tee',35)">
Add to Cart
</button>

</div>



</div>






<h1 class="title" style="margin-top:100px;">All Products</h1>



<div class="cards">



<div class="card accessories">

<img src="Images/pegs.jpg">

<h2>Pegs</h2>

<p>$30</p>

<button class="add" onclick="add('Pegs',30)">
Add to Cart
</button>

</div>




<div class="card accessories">

<img src="Images/stickers.jpg">

<h2>Stickers</h2>

<p>$10</p>

<button class="add" onclick="add('Stickers',10)">
Add to Cart
</button>

</div>




<div class="card clothes">

<img src="Images/hoodie.jpg">

<h2>Hoodie</h2>

<p>$70</p>

<button class="add" onclick="add('Hoodie',70)">
Add to Cart
</button>

</div>


</div>

</section>






<div id="cart-box">


<h1>Your Cart</h1>


<div id="items">

</div>


<h2>Total $<span id="total">0</span></h2>


<button class="checkout" onclick="checkout()">

Checkout

</button>


<button class="back" onclick="closeCart()">

Close

</button>


</div>







<script>


let cart=JSON.parse(localStorage.getItem("cart"))||[];



function save(){

localStorage.setItem("cart",JSON.stringify(cart));

}



function add(name,price){

cart.push({

name:name,
price:price

});

save();

update();

}



function update(){


document.getElementById("count").innerHTML=cart.length;


let html="";

let total=0;


cart.forEach((x,i)=>{


total+=x.price;


html+=`

<div class="cart-item">

${x.name} $${x.price}

<button class="remove" onclick="removeItem(${i})">

X

</button>

</div>

`;

});


document.getElementById("items").innerHTML=html;

document.getElementById("total").innerHTML=total;


}



function removeItem(i){

cart.splice(i,1);

save();

update();

}



function openCart(){

document.getElementById("cart-box").style.display="block";

}



function closeCart(){

document.getElementById("cart-box").style.display="none";

}



function checkout(){

alert("Checkout coming soon 🖤");

}




function home(){

document.querySelectorAll(".card").forEach(c=>{

c.style.display="block";

});

window.scrollTo(0,0);

}



function filter(type){


document.querySelectorAll(".card").forEach(c=>{


c.style.display =
c.classList.contains(type) ? "block" : "none";


});


window.scrollTo(0,0);


}




window.onload=()=>{


setTimeout(()=>{

document.getElementById("loader").style.display="none";


},2000);



document.querySelectorAll(".card").forEach(card=>{


let observer=new IntersectionObserver(e=>{


if(e[0].isIntersecting){

card.classList.add("show");

}


});


observer.observe(card);


});


update();

}



</script>


</body>
</html>
