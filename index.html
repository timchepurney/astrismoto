<!DOCTYPE html>
<html>
<head>

<title>Astris</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#000;
color:white;
font-family:Arial, Helvetica, sans-serif;
}


header{
height:120px;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 6%;
position:sticky;
top:0;
background:#000;
z-index:10;
}


.logo{
font-size:55px;
font-weight:900;
letter-spacing:14px;
}


nav{
display:flex;
gap:20px;
}


nav button,.cart{
background:#111;
color:white;
border:1px solid #333;
padding:16px 25px;
border-radius:40px;
font-weight:800;
cursor:pointer;
}


.section{
display:none;
padding:70px 7%;
}


.active{
display:block;
}


h2{
font-size:60px;
margin-bottom:40px;
}


.cards{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:30px;
}


.card{
background:#111;
border:1px solid #333;
border-radius:30px;
padding:25px;
cursor:pointer;
}


.card img{
width:100%;
height:220px;
object-fit:cover;
border-radius:20px;
}


.card h3{
font-size:35px;
margin-top:15px;
}


.card p{
color:#aaa;
font-size:22px;
margin:10px 0;
}


.product img{
width:400px;
max-width:100%;
border-radius:30px;
}


.product h1{
font-size:60px;
}


.product p{
font-size:30px;
margin:20px 0;
}


button{
cursor:pointer;
}


.buy,.add,.back{
padding:16px 30px;
border:none;
border-radius:30px;
font-weight:900;
margin:10px;
}


.add{
background:white;
}


.buy{
background:#333;
color:white;
}


.back{
background:#111;
color:white;
}



#cart-box{
display:none;
position:fixed;
right:25px;
top:130px;
width:400px;
background:#111;
border:1px solid #333;
border-radius:30px;
padding:30px;
z-index:50;
}


.cart-line{
display:flex;
justify-content:space-between;
margin:15px 0;
}


.remove{
background:#222;
color:white;
border:none;
padding:8px;
border-radius:20px;
}


@media(max-width:800px){

.cards{
grid-template-columns:1fr;
}

.logo{
font-size:35px;
}

}

</style>

</head>



<body>


<header>


<div class="logo">ASTRIS</div>


<nav>

<button onclick="show('home')">Home</button>

<button onclick="show('accessories')">Accessories</button>

<button onclick="show('clothes')">Clothing</button>

</nav>


<button class="cart" onclick="openCart()">

🖤 Cart (<span id="count">0</span>)

</button>


</header>





<section id="home" class="section active">

<h2>Most Popular</h2>


<div class="cards">


<div class="card" onclick="product('Foot Locks',40,'Images/footlocks.jpg')">

<img src="Images/footlocks.jpg">

<h3>Foot Locks</h3>

<p>$40</p>

</div>


</div>


</section>







<section id="accessories" class="section">


<button class="back" onclick="show('home')">
← Back
</button>


<h2>Accessories</h2>


<div class="cards">


<div class="card" onclick="product('Foot Locks',40,'Images/footlocks.jpg')">

<img src="Images/footlocks.jpg">

<h3>Foot Locks</h3>

<p>$40</p>

</div>


</div>


</section>








<section id="clothes" class="section">


<button class="back" onclick="show('home')">
← Back
</button>


<h2>Clothing</h2>


<div class="cards">


<div class="card" onclick="product('ASTRIS Hoodie',70,'Images/hoodie.jpg')">

<img src="Images/hoodie.jpg">

<h3>ASTRIS Hoodie</h3>

<p>$70</p>

</div>


</div>


</section>






<section id="product" class="section">


<button class="back" onclick="show('home')">
← Back
</button>


<div class="product">


<img id="product-img">


<h1 id="product-name"></h1>

<p id="product-price"></p>


<button class="add" onclick="addCurrent()">

🖤 Add to Cart

</button>


<button class="buy">

Buy Now

</button>


</div>


</section>





<div id="cart-box">


<h2>Cart</h2>


<div id="items"></div>


<h3>Total $<span id="total">0</span></h3>


<button class="back" onclick="closeCart()">

Close

</button>


</div>






<script>


let cart=[];

let current={};



function show(page){

document.querySelectorAll(".section").forEach(x=>x.classList.remove("active"));

document.getElementById(page).classList.add("active");

}



function product(name,price,img){

current={
name:name,
price:price,
img:img
};


document.getElementById("product-img").src=img;

document.getElementById("product-name").innerHTML=name;

document.getElementById("product-price").innerHTML="$"+price;


show("product");

}



function addCurrent(){

add(current.name,current.price);

}



function add(name,price){

cart.push({
name:name,
price:price
});


update();

}




function update(){

document.getElementById("count").innerHTML=cart.length;


let html="";

let total=0;


cart.forEach((x,i)=>{

total+=x.price;


html+=`

<div class="cart-line">

${x.name} $${x.price}

<button class="remove" onclick="removeItem(${i})">
X
</button>

</div>`;

});


document.getElementById("items").innerHTML=html;

document.getElementById("total").innerHTML=total;

}




function removeItem(i){

cart.splice(i,1);

update();

}




function openCart(){

document.getElementById("cart-box").style.display="block";

}



function closeCart(){

document.getElementById("cart-box").style.display="none";

}



</script>


</body>
</html>
