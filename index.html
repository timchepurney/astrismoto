<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ASTRIS MOTO</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}
body{background:#000;color:#fff;overflow-x:hidden;}

/* LOADER */
#loader{
position:fixed;inset:0;background:#000;
display:flex;flex-direction:column;justify-content:center;align-items:center;z-index:9999;
}
#loader h1{letter-spacing:8px;}
.dots::after{content:"";animation:dots 1s infinite steps(3);}
@keyframes dots{0%{content:"."}33%{content:".."}66%{content:"..."}}

/* TOP BAR */
header{
display:flex;justify-content:space-between;align-items:center;
padding:15px 25px;
position:sticky;top:0;background:#000;border-bottom:1px solid #111;z-index:1000;
}

.logo{letter-spacing:5px;font-weight:bold;}
.right{display:flex;gap:10px;align-items:center;}

input{
padding:8px;border-radius:6px;border:none;outline:none;
background:#111;color:#fff;width:140px;
}

/* HERO */
.hero{
height:55vh;display:flex;flex-direction:column;
justify-content:center;align-items:center;text-align:center;
}
.hero h1{font-size:55px;letter-spacing:8px;}
.hero p{opacity:0.6;margin-top:10px;}

/* FILTER */
.filters{
display:flex;gap:10px;justify-content:center;
padding:10px 20px;flex-wrap:wrap;
}
.filters button{
padding:6px 12px;border:none;border-radius:6px;
cursor:pointer;background:#111;color:#fff;
}
.filters button:hover{background:#222;}

/* PRODUCTS */
.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;padding:30px;
}

.card{
background:#111;padding:15px;border-radius:12px;
transition:0.3s;cursor:pointer;position:relative;
}
.card:hover{transform:scale(1.05);}
.card img{width:100%;border-radius:10px;}
.card button{
margin-top:10px;width:100%;padding:10px;
background:#fff;border:none;color:#000;
font-weight:bold;border-radius:6px;cursor:pointer;
}

/* CART */
.cart{
position:fixed;right:-420px;top:0;
width:320px;height:100%;
background:#111;padding:20px;
transition:0.3s;overflow-y:auto;z-index:2000;
}
.cart.open{right:0;}
.item{
display:flex;justify-content:space-between;
margin-bottom:10px;background:#000;
padding:10px;border-radius:8px;
}
.item button{background:red;border:none;color:#fff;padding:3px 6px;cursor:pointer;border-radius:4px;}

/* MODAL */
.modal{
position:fixed;inset:0;background:rgba(0,0,0,0.8);
display:none;justify-content:center;align-items:center;z-index:3000;
}
.modal-content{
background:#111;padding:20px;border-radius:12px;
width:300px;text-align:center;
}

/* TOAST */
#toast{
position:fixed;bottom:20px;left:50%;
transform:translateX(-50%);
background:#fff;color:#000;
padding:10px 15px;border-radius:8px;
opacity:0;transition:0.3s;
}

/* BUTTONS */
.pay{
margin-top:10px;width:100%;
padding:10px;border:none;
background:#0070ba;color:#fff;
border-radius:6px;cursor:pointer;
}

/* FADE */
.fade{opacity:0;transform:translateY(30px);transition:0.6s;}
.fade.show{opacity:1;transform:translateY(0);}
</style>
</head>

<body>

<!-- LOADER -->
<div id="loader">
<h1>ASTRIS MOTO</h1>
<div class="dots">Loading</div>
</div>

<header>
<div class="logo">ASTRIS</div>

<div class="right">
<input id="search" placeholder="search..." oninput="filter()"/>
<button onclick="toggleCart()">🛒</button>
</div>
</header>

<div class="hero fade">
<h1>ASTRIS MOTO</h1>
<p>built for riders. not followers.</p>
</div>

<div class="filters fade">
<button onclick="showAll()">All</button>
<button onclick="filterCat('gear')">Gear</button>
<button onclick="filterCat('accessories')">Accessories</button>
</div>

<section class="products" id="products">

<div class="card fade" data-name="foot locks" data-cat="gear">
<img src="https://via.placeholder.com/300"/>
<h3>Foot Locks</h3>
<p>$15</p>
<button onclick="add('Foot Locks',15)">Add</button>
</div>

<div class="card fade" data-name="grips" data-cat="gear">
<img src="https://via.placeholder.com/300"/>
<h3>Grips</h3>
<p>$10</p>
<button onclick="add('Grips',10)">Add</button>
</div>

<div class="card fade" data-name="pegs" data-cat="gear">
<img src="https://via.placeholder.com/300"/>
<h3>Pegs</h3>
<p>$18</p>
<button onclick="add('Pegs',18)">Add</button>
</div>

<div class="card fade" data-name="stickers" data-cat="accessories">
<img src="https://via.placeholder.com/300"/>
<h3>Sticker Pack</h3>
<p>$5</p>
<button onclick="add('Stickers',5)">Add</button>
</div>

</section>

<!-- CART -->
<div class="cart" id="cart">
<h3>Your Cart</h3>
<div id="items"></div>
<h3 id="total">Total: $0</h3>
<button class="pay" onclick="checkout()">Checkout</button>
</div>

<!-- CHECKOUT MODAL -->
<div class="modal" id="modal">
<div class="modal-content">
<h2>Checkout 💳</h2>
<p>Total: <span id="mTotal">$0</span></p>
<button class="pay" onclick="pay()">Pay Now</button>
<button onclick="closeModal()">Close</button>
</div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script>

let cart = [];

function showToast(msg){
let t=document.getElementById("toast");
t.innerText=msg;
t.style.opacity=1;
setTimeout(()=>t.style.opacity=0,1200);
}

function toggleCart(){
document.getElementById("cart").classList.toggle("open");
}

function add(name,price){
cart.push({name,price});
render();
showToast("Added to cart 🔥");
}

function remove(i){
cart.splice(i,1);
render();
}

function render(){
let c=document.getElementById("items");
c.innerHTML="";
let total=0;

cart.forEach((x,i)=>{
total+=x.price;
c.innerHTML+=`
<div class="item">
${x.name} $${x.price}
<button onclick="remove(${i})">X</button>
</div>`;
});

document.getElementById("total").innerText="Total: $"+total;
document.getElementById("mTotal").innerText="$"+total;
}

function checkout(){
document.getElementById("modal").style.display="flex";
}

function closeModal(){
document.getElementById("modal").style.display="none";
}

function pay(){
window.location.href="https://www.paypal.me/AstrisMoto";
}

/* SEARCH */
function filter(){
let v=document.getElementById("search").value.toLowerCase();
document.querySelectorAll(".card").forEach(c=>{
c.style.display=c.dataset.name.includes(v)?"block":"none";
});
}

/* CATEGORY */
function filterCat(cat){
document.querySelectorAll(".card").forEach(c=>{
c.style.display=c.dataset.cat===cat?"block":"none";
});
}

function showAll(){
document.querySelectorAll(".card").forEach(c=>c.style.display="block");
}

/* FADE */
const obs=new IntersectionObserver(e=>{
e.forEach(x=>{
if(x.isIntersecting)x.target.classList.add("show");
});
});

document.querySelectorAll(".fade").forEach(x=>obs.observe(x));

/* LOADER */
window.onload=()=>{
setTimeout(()=>document.getElementById("loader").style.display="none",2000);
render();
};

</script>

</body>
</html>
