<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ASTRIS MOTO</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#000;
color:#fff;
overflow-x:hidden;
}

/* LOADER */
#loader{
position:fixed;
inset:0;
background:#000;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:9999;
}

#loader h1{
letter-spacing:6px;
margin-bottom:20px;
}

.dots::after{
content:"";
animation:dots 1s infinite steps(3);
}

@keyframes dots{
0%{content:"."}
33%{content:".."}
66%{content:"..."}
}

/* HEADER */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 40px;
position:sticky;
top:0;
background:#000;
border-bottom:1px solid #111;
}

.logo{
font-size:24px;
letter-spacing:4px;
font-weight:bold;
}

.cart-btn{
background:#fff;
color:#000;
padding:8px 14px;
border:none;
cursor:pointer;
font-weight:bold;
}

/* HERO */
.hero{
height:60vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
}

.hero h1{
font-size:60px;
letter-spacing:8px;
}

.hero p{
opacity:0.6;
margin-top:10px;
}

/* PRODUCTS */
.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
padding:40px;
}

/* FADE IN */
.fade{
opacity:0;
transform:translateY(30px);
transition:all 0.8s ease;
}

.fade.show{
opacity:1;
transform:translateY(0);
}

.card{
background:#111;
padding:15px;
border-radius:10px;
transition:0.3s;
cursor:pointer;
}

.card:hover{
transform:scale(1.05);
}

.card img{
width:100%;
border-radius:10px;
}

.card h3{
margin-top:10px;
}

.card button{
margin-top:10px;
width:100%;
padding:10px;
border:none;
background:#fff;
color:#000;
cursor:pointer;
font-weight:bold;
}

/* CART */
.cart{
position:fixed;
right:-400px;
top:0;
width:300px;
height:100%;
background:#111;
padding:20px;
transition:0.3s;
overflow-y:auto;
border-left:1px solid #222;
}

.cart.open{
right:0;
}

.item{
margin-bottom:10px;
padding:10px;
background:#000;
border-radius:8px;
}

.close{
background:red;
color:#fff;
border:none;
padding:5px 10px;
cursor:pointer;
margin-bottom:10px;
}

/* FOOTER */
footer{
padding:40px;
border-top:1px solid #111;
text-align:center;
opacity:0.8;
}

footer a{
color:#fff;
text-decoration:underline;
}
</style>
</head>

<body>

<!-- LOADER -->
<div id="loader">
<h1>ASTRIS MOTO</h1>
<div class="dots">Loading</div>
</div>

<header>
<div class="logo">ASTRIS</div>
<button class="cart-btn" onclick="toggleCart()">CART 🛒</button>
</header>

<section class="hero fade">
<h1>ASTRIS MOTO</h1>
<p>built for riders. not followers.</p>
</section>

<section class="products">

<div class="card fade">
<img src="https://via.placeholder.com/300" />
<h3>Foot Locks</h3>
<p>$15</p>
<button onclick="addToCart('Foot Locks',15)">Add</button>
</div>

<div class="card fade">
<img src="https://via.placeholder.com/300" />
<h3>Grips</h3>
<p>$10</p>
<button onclick="addToCart('Grips',10)">Add</button>
</div>

<div class="card fade">
<img src="https://via.placeholder.com/300" />
<h3>Handlebar Pegs</h3>
<p>$18</p>
<button onclick="addToCart('Pegs',18)">Add</button>
</div>

<div class="card fade">
<img src="https://via.placeholder.com/300" />
<h3>Stickers Pack</h3>
<p>$5</p>
<button onclick="addToCart('Stickers',5)">Add</button>
</div>

</section>

<!-- CART -->
<div class="cart" id="cart">
<button class="close" onclick="toggleCart()">Close</button>
<h2>Your Cart</h2>
<div id="cartItems"></div>
<h3 id="total">Total: $0</h3>
</div>

<!-- FOOTER -->
<footer class="fade">
<p>Payments: PayPal / Cash App (add later)</p>
<p>Contact: <a href="mailto:Astrismoto@gmail.com">Astrismoto@gmail.com</a></p>
</footer>

<script>
let cart = [];

function toggleCart(){
document.getElementById("cart").classList.toggle("open");
}

function addToCart(name, price){
cart.push({name, price});
renderCart();
}

function renderCart(){
let container = document.getElementById("cartItems");
container.innerHTML = "";
let total = 0;

cart.forEach(item=>{
total += item.price;
container.innerHTML += `
<div class="item">
${item.name} - $${item.price}
</div>
`;
});

document.getElementById("total").innerText = "Total: $" + total;
}

/* loader */
window.onload = ()=>{
setTimeout(()=>{
document.getElementById("loader").style.display = "none";
},2000);
};

/* scroll fade */
const observer = new IntersectionObserver(entries=>{
entries.forEach(entry=>{
if(entry.isIntersecting){
entry.target.classList.add("show");
}
});
});

document.querySelectorAll(".fade").forEach(el=>{
observer.observe(el);
});
</script>

</body>
</html>
